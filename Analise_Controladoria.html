<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANÁLISE DA CONTROLADORIA</title>
<style>
:root{
  --navy:#1B3B6F;
  --navy-dark:#122A52;
  --gray-bg:#D9D9D9;
  --border:#BDBDBD;
  --border-light:#E3E3E3;
  --text:#2B2B2B;
  --muted:#6C7A89;
  --surface:#FFFFFF;
  --surface-alt:#F5F6F7;
  --green:#1E7A34;
  --red:#B3261E;
  --radius:6px;
}
*{box-sizing:border-box}
html,body{width:100%;margin:0;padding:0;background:#EEF0F2}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:16px;color:var(--text);padding:20px}

.app-header{
  display:flex;align-items:center;gap:20px;
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 24px;margin-bottom:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.brand-mark{font-family:Georgia,'Times New Roman',serif;font-weight:800;font-style:italic;font-size:30px;color:var(--navy);letter-spacing:.5px;white-space:nowrap}
.brand-divider{width:1px;height:40px;background:var(--border-light)}
.page-heading h1{margin:0;font-size:22px;font-weight:700;color:var(--navy-dark);letter-spacing:.3px}
.page-heading p{margin:2px 0 0;font-size:14px;color:var(--muted)}

h3{font-size:16px;font-weight:700;margin:22px 0 10px;color:var(--navy-dark);text-transform:uppercase;letter-spacing:.3px}

.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:18px}
.wrap{width:100%;overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:var(--gray-bg);border:1px solid var(--border);padding:12px 8px;text-align:center;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
td{border:1px solid var(--border-light);padding:8px}
input[type=text]{width:100%;height:40px;background:var(--surface-alt);border:1px solid var(--border);border-radius:4px;font-size:15px;padding:0 10px;color:#555}
.c{text-align:center}
input[type=checkbox]{width:22px;height:22px;accent-color:var(--navy);cursor:pointer}
th.col-apr,th.col-rep{width:70px}

textarea{width:100%;height:220px;border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:15px;font-family:inherit;background:var(--surface);resize:vertical}
textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,59,111,.12)}
</style>
<script>
function sel(a,b){if(document.getElementById(a).checked){document.getElementById(b).checked=false;}}
function validarControladoria(){var rc=document.getElementById('reprovado_comex').checked;var rp=document.getElementById('reprovado_compras').checked;var j=document.getElementById('justificativa').value.trim();if((rc||rp)&&j===''){alert('A REPROVAÇÃO DA PROPOSTA REQUER O PREENCHIMENTO OBRIGATÓRIO DA JUSTIFICATIVA DA DECISÃO DA CONTROLADORIA.');document.getElementById('justificativa').focus();return false;}return true;}
</script>
</head>
<body>

<header class="app-header">
  <div class="brand-mark">SUGGAR</div>
  <div class="brand-divider"></div>
  <div class="page-heading">
    <h1>ANÁLISE DA CONTROLADORIA</h1>
    <p>Controladoria · Aprovação de Propostas de Compra</p>
  </div>
</header>

<div class="card">
<div class="wrap">
<table>
<tr><th>PRODUTO</th><th>QTD COMEX</th><th>PREÇO UNIT.</th><th>PREÇO TOTAL</th><th>PRAZO</th><th>INDICADOR</th><th class="col-apr">APR.</th><th class="col-rep">REP.</th></tr>
<tr>
<td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td>
<td class="c"><input type="checkbox" id="aprovado_comex" onclick="sel('aprovado_comex','reprovado_comex')"></td>
<td class="c"><input type="checkbox" id="reprovado_comex" onclick="sel('reprovado_comex','aprovado_comex')"></td>
</tr></table>
</div>
</div>

<div class="card">
<div class="wrap">
<table>
<tr><th>PRODUTO</th><th>QTD COMPRA</th><th>PREÇO UNIT.</th><th>PREÇO TOTAL</th><th>PRAZO</th><th>INDICADOR</th><th class="col-apr">APR.</th><th class="col-rep">REP.</th></tr>
<tr>
<td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td><td><input type="text" readonly></td>
<td class="c"><input type="checkbox" id="aprovado_compras" onclick="sel('aprovado_compras','reprovado_compras')"></td>
<td class="c"><input type="checkbox" id="reprovado_compras" onclick="sel('reprovado_compras','aprovado_compras')"></td>
</tr></table>
</div>
</div>

<h3>Justificativa da Decisão da Controladoria</h3>
<textarea id="justificativa" placeholder="INFORME DE FORMA OBJETIVA OS MOTIVOS QUE FUNDAMENTAM A REPROVAÇÃO DA PROPOSTA, INCLUINDO DIVERGÊNCIAS IDENTIFICADAS, RESTRIÇÕES FINANCEIRAS, INCONSISTÊNCIAS COMERCIAIS, DOCUMENTAIS OU QUALQUER OUTRO FATOR QUE IMPACTE A APROVAÇÃO."></textarea>

</body>
</html>
