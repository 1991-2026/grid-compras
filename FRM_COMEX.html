<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- =====================================================
         CONFIGURAÇÕES BÁSICAS DA PÁGINA
    ====================================================== -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Cotação Comércio Exterior</title>

    <!-- =====================================================
         ESTILOS (CSS)
    ====================================================== -->
    <style>

        /* Variáveis globais */
        :root {
            --navy: #1B3B6F;
            --navy-dark: #122A52;
            --gray-bg: #D9D9D9;
            --border: #BDBDBD;
            --border-light: #E3E3E3;
            --text: #2B2B2B;
            --muted: #6C7A89;
            --surface: #FFFFFF;
            --surface-alt: #F5F6F7;
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: #EEF0F2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            color: var(--text);
            font-size: 16px;
            padding: 20px;
        }

        /* =====================================================
           CABEÇALHO
        ====================================================== */
        .app-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 16px 24px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .06);
        }

        .brand-mark {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 30px;
            color: var(--navy-dark);
        }

        .brand-divider {
            width: 1px;
            height: 40px;
            background: var(--border-light);
        }

        .page-heading h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--navy-dark);
        }

        .page-heading p {
            margin: 2px 0 0;
            font-size: 14px;
            color: var(--muted);
        }

        /* =====================================================
           BOTÕES
        ====================================================== */
        .toolbar {
            margin-bottom: 14px;
        }

        .btn {
            background: #123D7A;
            border: 1px solid #123D7A;
            border-radius: 6px;
            padding: 10px 16px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-danger {
            background: #D9534F;
            color: #fff;
            border: 1px solid #D9534F;
            padding: 8px 14px;
            border-radius: 6px;
        }

        /* =====================================================
           TABELA
        ====================================================== */
        .card {
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }

        .wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid var(--border-light);
            padding: 8px;
        }

        th {
            background: var(--gray-bg);
            text-align: center;
        }

        /* =====================================================
           CAMPOS
        ====================================================== */
        input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 10px;
        }

        .readonly {
            background: var(--surface-alt);
        }

        .acao {
            text-align: center;
            width: 120px;
        }

        /* =====================================================
           CONTADOR DE ITENS
        ====================================================== */
        .total-itens {
            margin-top: 14px;
            color: #123D7A;
            font-size: 14px;
            font-weight: 700;
        }

    </style>

    <!-- =====================================================
         FUNÇÕES JAVASCRIPT
    ====================================================== -->
    <script>

        /* Formatação de moeda */
        function moeda(v) {
            return new Intl.NumberFormat(
                'pt-BR',
                {
                    style: 'currency',
                    currency: 'BRL'
                }
            ).format(v);
        }

        /* Conversão para número */
        function valor(campo) {
            let n = (campo.value || '')
                .replace(/\./g, '')
                .replace(',', '.')
                .replace(/[^0-9.]/g, '');

            return parseFloat(n) || 0;
        }

        /* Calcula total */
        function calc(el) {

            let tr = el.closest('tr');

            let qtd = valor(
                tr.querySelector('.qtd')
            );

            let preco = valor(
                tr.querySelector('.preco')
            );

            tr.querySelector('.total').value =
                moeda(qtd * preco);
        }

        /* Formata moeda */
        function fmt(el) {

            let v = valor(el);

            el.value = v
                ? moeda(v)
                : '';

            calc(el);
        }

        /* Atualiza contador */
        function atualizarContador() {

            document.getElementById(
                'contadorItens'
            ).textContent =
                document.querySelectorAll('#tb tr')
                    .length;
        }

        /* Adiciona linha */
        function addRow() {

            let r =
                document.getElementById('tb')
                    .insertRow();

            r.innerHTML =
                document.getElementById('tpl')
                    .innerHTML;

            atualizarContador();
        }

        /* Exclui linha */
        function delRow(btn) {

            btn.closest('tr').remove();

            atualizarContador();
        }

    </script>

</head>

<body>

    <!-- =====================================================
         CABEÇALHO
    ====================================================== -->
    <header class="app-header">

        <div class="brand-mark">
            SUGGAR
        </div>

        <div class="brand-divider"></div>

        <div class="page-heading">
            <h1>COTAÇÃO COMÉRCIO EXTERIOR</h1>

            <p>
                Departamento de Comércio Exterior ·
                Cotação de Fornecedores Internacionais
            </p>
        </div>

    </header>

    <!-- =====================================================
         BOTÃO INSERIR LINHA
    ====================================================== -->
    <div class="toolbar">

        <button
            class="btn"
            onclick="addRow()">

            + Inserir Linha

        </button>

    </div>

    <!-- =====================================================
         TABELA PRINCIPAL
    ====================================================== -->
    <div class="card">
        <div class="wrap">

            <table>

                <thead>
                    <tr>
                        <th>CÓD.</th>
                        <th>PRODUTO</th>
                        <th>QTD PROD.</th>
                        <th>PRAZO PCP</th>
                        <th>CÓD. FORN.</th>
                        <th>FORNECEDOR</th>
                        <th>QTD COM. EXTERIOR</th>
                        <th>PREÇO UNIT.</th>
                        <th>TOTAL</th>
                        <th>PRAZO COM. EXTERIOR</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>

                <tbody id="tb"></tbody>

            </table>

        </div>
    </div>

    <!-- =====================================================
         TOTAL DE ITENS
    ====================================================== -->
    <div class="total-itens">
        Total de itens:
        <span id="contadorItens">0</span>
    </div>

    <!-- =====================================================
         TEMPLATE DA LINHA
    ====================================================== -->
    <template id="tpl">

        <tr>

            <td><input class="readonly" readonly></td>

            <td><input class="readonly" readonly></td>

            <td><input class="readonly" readonly></td>

            <td><input class="readonly" readonly></td>

            <td><input></td>

            <td><input class="readonly" readonly></td>

            <td>
                <input
                    class="qtd"
                    oninput="calc(this)">
            </td>

            <td>
                <input
                    class="preco"
                    oninput="calc(this)"
                    onblur="fmt(this)">
            </td>

            <td>
                <input
                    class="total readonly"
                    readonly>
            </td>

            <td>
                <input>
            </td>

            <td class="acao">

                <button
                    class="btn-danger"
                    onclick="delRow(this)"
                    type="button">

                    Excluir

                </button>

            </td>

        </tr>

    </template>

    <!-- =====================================================
         INICIALIZAÇÃO
    ====================================================== -->
    <script>

        addRow();
        atualizarContador();

    </script>

</body>

</html>
