<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitação PCP</title>

<style>
:root{
--navy:#1B3B6F;
--gray:#D9D9D9;
--border:#E3E3E3;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
width:100%;
background:#EEF0F2;
}

body{
font-family:Segoe UI,Tahoma,Arial,sans-serif;
padding:20px;
color:#2b2b2b;
}

.app-header{
display:flex;
align-items:center;
gap:20px;
background:#fff;
border:1px solid var(--border);
border-radius:6px;
padding:16px 24px;
margin-bottom:20px;
}

.brand-mark{
font:italic 800 30px Georgia,serif;
color:var(--navy);
}

.brand-divider{
width:1px;
height:40px;
background:var(--border);
}

.page-heading h1{
margin:0;
color:#122A52;
}

.page-heading p{
margin:4px 0 0;
color:#6C7A89;
}

.toolbar{
margin-bottom:15px;
}

.btn{
padding:10px 16px;
border:1px solid #bdbdbd;
border-radius:6px;
background:#fff;
cursor:pointer;
font-weight:600;
}

.btn-danger{
color:#B3261E;
}

.card{
background:#fff;
border:1px solid var(--border);
border-radius:6px;
}

.wrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid var(--border);
padding:8px;
}

th{
background:var(--gray);
text-align:center;
}

input{
width:100%;
height:40px;
padding:0 10px;
border:1px solid #bdbdbd;
border-radius:4px;
}

.readonly{
background:#f5f6f7;
}

.acao{
text-align:center;
}
</style>

<script>

const URL_PRODUTOS =
"SUA_URL_ODATA_AQUI";

function notifyParentHeight(){

    const h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
    );

    if(window.parentIFrame &&
       typeof window.parentIFrame.resize==="function"){
        try{
            window.parentIFrame.resize();
        }catch(e){}
    }

    try{
        window.parent.postMessage(
            {type:"resize",height:h},
            "*"
        );
    }catch(e){}
}

async function buscarProduto(campo){

    const codigo = campo.value.trim();

    if(!codigo){
        return;
    }

    const linha = campo.closest("tr");

    const campoProduto =
        linha.querySelector(".produto");

    try{

        const response = await fetch(
            `${URL_PRODUTOS}?$filter=codigo eq '${codigo}'`
        );

        const dados = await response.json();

        if(
            dados.value &&
            dados.value.length > 0
        ){

            campoProduto.value =
                dados.value[0].descricao || "";

        }else{

            campoProduto.value = "";

            alert(
                "Código não encontrado: " +
                codigo
            );
        }

    }catch(error){

        console.error(error);

        alert(
            "Erro ao consultar produto."
        );

    }
}

function addRow(){

    const tbody =
        document.getElementById("tb");

    const row = tbody.insertRow();

    row.innerHTML =
        document.getElementById("tpl")
        .innerHTML;

    requestAnimationFrame(
        notifyParentHeight
    );
}

function delRow(botao){

    botao.closest("tr").remove();

    requestAnimationFrame(
        notifyParentHeight
    );
}

window.addEventListener("load",()=>{

    notifyParentHeight();

    if(window.ResizeObserver){
        new ResizeObserver(
            notifyParentHeight
        ).observe(document.body);
    }

    setTimeout(
        notifyParentHeight,
        500
    );

    setTimeout(
        notifyParentHeight,
        1500
    );
});

</script>

</head>

<body>

<header class="app-header">

<div class="brand-mark">
SUGGAR
</div>

<div class="brand-divider"></div>

<div class="page-heading">
<h1>SOLICITAÇÃO PCP</h1>
<p>Planejamento e Controle da Produção</p>
</div>

</header>

<div class="toolbar">

<button
class="btn"
type="button"
onclick="addRow()">

+ Inserir Linha

</button>

</div>

<div class="card">
<div class="wrap">

<table>

<thead>

<tr>
<th>CÓD. PRODUTO</th>
<th>PRODUTO</th>
<th>QTD</th>
<th>PRAZO</th>
<th>AÇÃO</th>
</tr>

</thead>

<tbody id="tb">

<tr>

<td>

<input
type="text"
name="codigo"
onblur="buscarProduto(this)">

</td>

<td>

<input
type="text"
class="readonly produto"
readonly>

</td>

<td>
<input type="text" name="qtd">
</td>

<td>
<input type="text" name="prazo">
</td>

<td class="acao">

<button
class="btn btn-danger"
type="button"
onclick="delRow(this)">

Excluir

</button>

</td>

</tr>

</tbody>

</table>

</div>
</div>

<template id="tpl">

<tr>

<td>

<input
type="text"
name="codigo"
onblur="buscarProduto(this)">

</td>

<td>

<input
type="text"
class="readonly produto"
readonly>

</td>

<td>
<input type="text" name="qtd">
</td>

<td>
<input type="text" name="prazo">
</td>

<td class="acao">

<button
class="btn btn-danger"
type="button"
onclick="delRow(this)">

Excluir

</button>

</td>

</tr>

</template>

https://cdn.jsdelivr.net/npm/@iframe-resizer/child"></script>

</body>
</html>
