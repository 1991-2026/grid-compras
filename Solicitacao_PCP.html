<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitação PCP</title>
<style>
:root{
  --navy:#1B3B6F;
  --navy-dark:#122A52;
  --gray-bg:#D9D9D9;
  --border:#BDBDBD;
  --border-light:#E3E3E3;
  --text:#2B2B2B;
  --muted:#6C7A89;
  --surface:#FFFFFF;
  --surface-alt:#F5F6F7;
  --radius:6px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;background:#EEF0F2}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:var(--text);font-size:16px;padding:20px}

.app-header{
  display:flex;align-items:center;gap:20px;
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius);padding:16px 24px;margin-bottom:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.brand-mark{font-family:Georgia,'Times New Roman',serif;font-weight:800;font-style:italic;font-size:30px;color:var(--navy);letter-spacing:.5px;white-space:nowrap}
.brand-divider{width:1px;height:40px;background:var(--border-light)}
.page-heading h1{margin:0;font-size:22px;font-weight:700;color:var(--navy-dark);letter-spacing:.3px}
.page-heading p{margin:2px 0 0;font-size:14px;color:var(--muted)}

.toolbar{margin-bottom:14px}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 16px;
  font-size:15px;font-weight:600;color:var(--navy-dark);
  cursor:pointer;transition:background .15s,box-shadow .15s;
}
.btn:hover{background:var(--surface-alt);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn-danger{color:#B3261E;padding:8px 14px;font-size:14px}
.btn-danger:hover{background:#FBEAE9}

.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.wrap{width:100%;overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid var(--border-light);padding:8px}
th{background:var(--gray-bg);border:1px solid var(--border);padding:12px 8px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:center}
th:nth-child(1),td:nth-child(1){width:20%}
th:nth-child(2),td:nth-child(2){width:30%}
th:nth-child(3),td:nth-child(3){width:15%}
th:nth-child(4),td:nth-child(4){width:25%}
th:nth-child(5),td:nth-child(5){width:10%}
input{width:100%;height:40px;font-size:15px;border:1px solid var(--border);border-radius:4px;padding:0 10px;background:var(--surface)}
input.readonly,input[readonly]{background:var(--surface-alt);color:#555}
input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,59,111,.12)}
.acao{text-align:center}
</style>
<script>
function addRow(){
    let t=document.getElementById('tb');
    let r=t.insertRow();
    r.innerHTML=document.getElementById('tpl').innerHTML;
}

function delRow(btn){
    btn.closest('tr').remove();
}
</script>
</head>
<body>

<header class="app-header">
  <div class="brand-mark">SUGGAR</div>
  <div class="brand-divider"></div>
  <div class="page-heading">
    <h1>SOLICITAÇÃO PCP</h1>
    <p>Planejamento e Controle da Produção</p>
  </div>
</header>

<div class="toolbar">
  <button class="btn" type="button" onclick="addRow()">+ Inserir Linha</button>
</div>

<div class="card">
<div class="wrap">
<table>

<thead>
<tr>
<th>CÓD. PRODUTO</th>
<th>PRODUTO</th>
<th>QTD</th>
<th>PRAZO</th>
<th>AÇÃO</th>
</tr>
</thead>

<tbody id="tb">

<tr>
<td><input type="text"></td>
<td><input type="text" class="readonly" readonly></td>
<td><input type="text"></td>
<td><input type="text"></td>
<td class="acao"><button class="btn btn-danger" type="button" onclick="delRow(this)">Excluir</button></td>
</tr>

</tbody>

</table>
</div>
</div>

<template id="tpl">
<tr>
<td><input type="text"></td>
<td><input type="text" class="readonly" readonly></td>
<td><input type="text"></td>
<td><input type="text"></td>
<td class="acao"><button class="btn btn-danger" type="button" onclick="delRow(this)">Excluir</button></td>
</tr>
</template>

</body>
</html>
