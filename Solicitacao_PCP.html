<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitação PCP</title>

<style>
:root{
  --navy:#1B3B6F;
  --navy-dark:#122A52;
  --gray-bg:#D9D9D9;
  --border:#BDBDBD;
  --border-light:#E3E3E3;
  --text:#2B2B2B;
  --muted:#6C7A89;
  --surface:#FFFFFF;
  --surface-alt:#F5F6F7;
  --radius:6px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100vh;
  background:#EEF0F2;
  overflow-x:hidden;
}

body{
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  color:var(--text);
  font-size:16px;
  padding:20px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:20px;
  background:#fff;
  border:1px solid #E3E3E3;
  border-radius:6px;
  padding:16px 24px;
  margin-bottom:20px;
}

.brand-mark{
  font-family:Georgia,serif;
  font-style:italic;
  font-weight:800;
  font-size:30px;
  color:#1B3B6F;
}

.brand-divider{
  width:1px;
  height:40px;
  background:#E3E3E3;
}

.page-heading h1{
  margin:0;
  color:#122A52;
}

.page-heading p{
  margin:2px 0 0;
  color:#6C7A89;
}

.toolbar{
  margin-bottom:15px;
}

.btn{
  border:1px solid #BDBDBD;
  background:#fff;
  border-radius:6px;
  padding:10px 16px;
  cursor:pointer;
  font-weight:600;
}

.btn-danger{
  color:#B3261E;
}

.card{
  background:#fff;
  border:1px solid #E3E3E3;
  border-radius:6px;
}

.wrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #E3E3E3;
  padding:8px;
}

th{
  background:#D9D9D9;
  text-align:center;
}

input{
  width:100%;
  height:40px;
  border:1px solid #BDBDBD;
  border-radius:4px;
  padding:0 10px;
}

input.readonly{
  background:#F5F6F7;
}

.acao{
  text-align:center;
}
</style>

<script>
function addRow(){
    const tbody = document.getElementById('tb');
    const row = tbody.insertRow();
    row.innerHTML = document.getElementById('tpl').innerHTML;

    setTimeout(updateIframe,100);
}

function delRow(btn){
    btn.closest("tr").remove();

    setTimeout(updateIframe,100);
}

function updateIframe(){

    if(window.parentIFrame){
        try{
            window.parentIFrame.resize();
        }catch(e){}
    }

    if(window.iFrameResize){
        try{
            window.iFrameResize();
        }catch(e){}
    }
}

window.addEventListener("load",function(){

    updateIframe();

    setTimeout(updateIframe,500);
    setTimeout(updateIframe,1000);
    setTimeout(updateIframe,2000);

});
</script>

</head>

<body>

<header class="app-header">
  <div class="brand-mark">SUGGAR</div>
  <div class="brand-divider"></div>

  <div class="page-heading">
    <h1>SOLICITAÇÃO PCP</h1>
    <p>Planejamento e Controle da Produção</p>
  </div>
</header>

<div class="toolbar">
  <button class="btn" type="button" onclick="addRow()">
    + Inserir Linha
  </button>
</div>

<div class="card">
<div class="wrap">

<table>

<thead>
<tr>
<th>CÓD. PRODUTO</th>
<th>PRODUTO</th>
<th>QTD</th>
<th>PRAZO</th>
<th>AÇÃO</th>
</tr>
</thead>

<tbody id="tb">

<tr>
<td><input type="text"></td>
<td><input type="text" class="readonly" readonly></td>
<td><input type="text"></td>
<td><input type="text"></td>

<td class="acao">
<button class="btn btn-danger" type="button" onclick="delRow(this)">
Excluir
</button>
</td>
</tr>

</tbody>

</table>

</div>
</div>

<template id="tpl">
<tr>
<td><input type="text"></td>
<td><input type="text" class="readonly" readonly></td>
<td><input type="text"></td>
<td><input type="text"></td>

<td class="acao">
<button class="btn btn-danger" type="button" onclick="delRow(this)">
Excluir
</button>
</td>
</tr>
</template>

<!-- ESSENCIAL PARA BPM COM IFRAME-RESIZER -->
https://cdn.jsdelivr.net/npm/@iframe-resizer/child>

</body>
</html>
