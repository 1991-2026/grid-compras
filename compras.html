<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
    font-family:Segoe UI,Arial,sans-serif;
    font-size:18px;
    padding:10px;
}
h2{font-size:24px}

.wrap{
    width:100%;
    overflow-x:auto;
}

table{
    border-collapse:collapse;
    width:100%;          /* ocupa toda a largura */
    table-layout:fixed;  /* distribui as colunas horizontalmente */
}

th,td{
    border:1px solid #bdbdbd;
    padding:8px;
}

th{
    background:#d9d9d9;
}

input{
    width:100%;
    height:38px;
    font-size:18px;
}

.readonly{
    background:#f5f5f5;
}

.acao{
    width:120px;
    text-align:center;
}

button{
    font-size:18px;
}
</style>
