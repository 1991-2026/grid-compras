<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Grid de Cotações</title>
<style>
body{font-family:Segoe UI,Arial;background:#f4f6f9;padding:20px}table{width:100%;border-collapse:collapse;min-width:1600px}th,td{border:1px solid #ddd;padding:6px}th{color:#fff}.pcp{background:#0F4C81}.compras{background:#198754}.comex{background:#D97706}.controladoria{background:#6B21A8}input,textarea{width:100%;border:none;padding:5px}.melhor{background:#dcfce7;font-weight:bold}button{padding:6px 10px}.add{background:#2563eb;color:#fff}
</style>
</head>
<body>
<h2>Grid de Cotações</h2>
<table><thead><tr>
<th class="pcp">Código</th><th class="pcp">Descrição</th><th class="pcp">Quantidade</th><th class="pcp">Prazo Dias</th>
<th class="compras">Cód. Forn.</th><th class="compras">Fornecedor</th><th class="compras">Preço Unit.</th><th class="compras">Total</th><th class="compras">Prazo</th>
<th class="comex">Cód. Forn.</th><th class="comex">Fornecedor</th><th class="comex">Preço Unit.</th><th class="comex">Total</th><th class="comex">Prazo</th>
<th class="controladoria">Melhor Preço</th><th class="controladoria">Fornecedor Vencedor</th><th class="controladoria">Aprovação</th><th class="controladoria">Observação</th><th class="controladoria">Ação</th>
</tr></thead><tbody id="grid"></tbody></table>
<button class="add" onclick="addLinha()">Adicionar Linha</button>
<script>
let dados=[];
function moeda(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});} 
function addLinha(){dados.push({aprovado:false});render();}
function remover(i){dados.splice(i,1);render();}
function update(i,c,v){dados[i][c]=v;let q=parseFloat(dados[i].qtd||0);let pc=parseFloat(dados[i].preco_compras||0);let pe=parseFloat(dados[i].preco_comex||0);dados[i].total_compras=(q*pc);dados[i].total_comex=(q*pe);if(pc>0&&pe>0){dados[i].melhor_preco=Math.min(pc,pe);dados[i].fornecedor_aprovado=(pc<=pe)?(dados[i].descricao_fornecedor_compras||'Compras'):(dados[i].descricao_fornecedor_comex||'COMEX');}render();}
function render(){let h='';dados.forEach((r,i)=>{h+=`<tr><td><input value='${r.codigo||""}' oninput="update(${i},'codigo',this.value)"></td><td><input value='${r.descricao||""}' oninput="update(${i},'descricao',this.value)"></td><td><input value='${r.qtd||""}' oninput="update(${i},'qtd',this.value)"></td><td><input value='${r.prazo_pcp||""}' oninput="update(${i},'prazo_pcp',this.value)"></td><td><input value='${r.fornecedor_compras||""}' oninput="update(${i},'fornecedor_compras',this.value)"></td><td><input value='${r.descricao_fornecedor_compras||""}' oninput="update(${i},'descricao_fornecedor_compras',this.value)"></td><td><input value='${r.preco_compras||""}' oninput="update(${i},'preco_compras',this.value)"></td><td>${moeda(r.total_compras)}</td><td><input value='${r.prazo_compras||""}' oninput="update(${i},'prazo_compras',this.value)"></td><td><input value='${r.fornecedor_comex||""}' oninput="update(${i},'fornecedor_comex',this.value)"></td><td><input value='${r.descricao_fornecedor_comex||""}' oninput="update(${i},'descricao_fornecedor_comex',this.value)"></td><td><input value='${r.preco_comex||""}' oninput="update(${i},'preco_comex',this.value)"></td><td>${moeda(r.total_comex)}</td><td><input value='${r.prazo_comex||""}' oninput="update(${i},'prazo_comex',this.value)"></td><td class='melhor'>${moeda(r.melhor_preco)}</td><td>${r.fornecedor_aprovado||''}</td><td><input type='checkbox' ${(r.aprovado)?'checked':''} onchange="update(${i},'aprovado',this.checked)"></td><td><textarea oninput="update(${i},'observacao',this.value)">${r.observacao||''}</textarea></td><td><button onclick='remover(${i})'>X</button></td></tr>`});document.getElementById('grid').innerHTML=h;}
addLinha();
</script></body></html>
