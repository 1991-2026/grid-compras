<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:#f4f6f9;
    padding:15px;
}

h2{
    margin-top:0;
    color:#1f2937;
    font-size:24px;
}

.container{
    width:100%;
    overflow-x:auto;
    background:white;
    border-radius:12px;
    box-shadow:0 3px 12px rgba(0,0,0,.12);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:2200px;
}

th{
    color:white;
    padding:10px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.5px;
    border:1px solid #d1d5db;
}

td{
    border:1px solid #e5e7eb;
    padding:4px;
}

input,
textarea{
    width:100%;
    border:none;
    padding:6px;
    background:transparent;
    font-size:13px;
}

input:disabled,
textarea:disabled{
    background:#f3f4f6;
    color:#374151;
}

textarea{
    min-height:60px;
    resize:vertical;
}

button{
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.add{
    margin-top:10px;
    background:#2563eb;
    color:white;
}

.remove{
    background:#dc2626;
    color:white;
}

.pcp{
    background:#0f4c81;
}

.compras{
    background:#15803d;
}

.comex{
    background:#c2410c;
}

.controladoria{
    background:#6b21a8;
}

.melhor{
    background:#dcfce7;
    font-weight:bold;
    color:#166534;
}

.aprovadoLinha{
    background:#ecfdf5;
}

</style>
</head>

<body>

<h2>Itens de Cotação</h2>

<div class="container">

<table>

<thead>
<tr id="cabecalho"></tr>
</thead>

<tbody id="grid"></tbody>

</table>

</div>

<button class="add" onclick="addLinha()">
+ Adicionar linha
</button>

<script>

//================================
// PERFIL
//================================

let perfil = "pcp";
let dados = [];

//================================
// IDENTIFICA TAREFA
//================================

try{

    if(window.parent &&
       window.parent.WCMAPI &&
       window.parent.WCMAPI.task){

        let tarefa =
        window.parent.WCMAPI.task.description.toLowerCase();

        if(tarefa.includes("compras")){
            perfil="compras";
        }
        else if(tarefa.includes("comex")){
            perfil="comex";
        }
        else if(
            tarefa.includes("control") ||
            tarefa.includes("finance")
        ){
            perfil="controladoria";
        }

    }

}catch(e){}

//================================
// CAMPO BPM
//================================

function getCampo(){

    try{

        return window.parent.document
        .getElementsByName("grid_dados")[0];

    }catch(e){}

    return null;
}

//================================
// CARREGAR
//================================

function carregar(){

    try{

        let campo = getCampo();

        if(campo && campo.value){

            dados = JSON.parse(campo.value);

        }

    }catch(e){

        dados=[];

    }

}

//================================
// SALVAR
//================================

function salvar(){

    try{

        let campo = getCampo();

        if(campo){

            campo.value =
            JSON.stringify(dados);

            campo.dispatchEvent(
                new Event("change")
            );

        }

    }catch(e){}

}

//================================
// FORMATAÇÃO
//================================

function moeda(valor){

    return Number(valor || 0)
    .toLocaleString(
        'pt-BR',
        {
            style:'currency',
            currency:'BRL'
        }
    );

}

//================================
// COLUNAS
//================================

function colunas(){

    let cols = [

        "codigo",
        "descricao",
        "qtd"

    ];

    if(perfil==="pcp"){

        return cols;

    }

    if(perfil==="compras"){

        cols.push(
            "setor_compras",
            "fornecedor_compras",
            "descricao_fornecedor_compras",
            "preco_compras",
            "total_compras",
            "prazo_compras"
        );

        return cols;
    }

    if(perfil==="comex"){

        cols.push(
            "setor_comex",
            "fornecedor_comex",
            "descricao_fornecedor_comex",
            "preco_comex",
            "total_comex",
            "prazo_comex"
        );

        return cols;
    }

    if(perfil==="controladoria"){

        cols.push(

            "setor_compras",
            "fornecedor_compras",
            "descricao_fornecedor_compras",
            "preco_compras",
            "total_compras",
            "prazo_compras",

            "setor_comex",
            "fornecedor_comex",
            "descricao_fornecedor_comex",
            "preco_comex",
            "total_comex",
            "prazo_comex",

            "melhor_preco",
            "fornecedor_aprovado",
            "aprovado",
            "observacao"
        );

    }

    return cols;
}

//================================
// PERMISSÃO
//================================

function podeEditar(c){

    if(perfil==="pcp"){

        return [
          "codigo",
          "descricao",
          "qtd"
        ].includes(c);

    }

    if(perfil==="compras"){

        return c.includes("compras");

    }

    if(perfil==="comex"){

        return c.includes("comex");

    }

    if(perfil==="controladoria"){

        return [
            "aprovado",
            "observacao",
            "fornecedor_aprovado"
        ].includes(c);

    }

    return false;
}

//================================
// ADICIONA LINHA
//================================

function addLinha(){

    dados.push({});

    salvar();

    render();

}

//================================
// REMOVE
//================================

function remover(i){

    dados.splice(i,1);

    salvar();

    render();

}

//================================
// CALCULA
//================================

function update(i,c,v){

    dados[i][c] = v;

    let qtd =
    parseFloat(
      String(dados[i].qtd || 0)
      .replace(",",".")
    );

    let vCompras =
    parseFloat(
      String(dados[i].preco_compras || 0)
      .replace(",",".")
    );

    let vComex =
    parseFloat(
      String(dados[i].preco_comex || 0)
      .replace(",",".")
    );

    dados[i].total_compras =
    (qtd * vCompras).toFixed(2);

    dados[i].total_comex =
    (qtd * vComex).toFixed(2);

    if(vCompras > 0 &&
       vComex > 0){

        dados[i].melhor_preco =
        Math.min(
            vCompras,
            vComex
        );

        dados[i].fornecedor_aprovado =
        vCompras < vComex
        ? "COMPRAS"
        : "COMEX";
    }

    salvar();

    render();
}

//================================
// RENDER
//================================

function render(){

    const cols = colunas();

    const nomes = {

      codigo:"Código",
      descricao:"Descrição",
      qtd:"Quantidade",

      setor_compras:"Setor",
      fornecedor_compras:"Cód. Forn.",
      descricao_fornecedor_compras:"Fornecedor",
      preco_compras:"Preço Unit.",
      total_compras:"Total (R$)",
      prazo_compras:"Prazo Dias",

      setor_comex:"Setor",
      fornecedor_comex:"Cód. Forn.",
      descricao_fornecedor_comex:"Fornecedor",
      preco_comex:"Preço Unit.",
      total_comex:"Total (R$)",
      prazo_comex:"Prazo Dias",

      melhor_preco:"Melhor Preço",
      fornecedor_aprovado:"Fornecedor Vencedor",
      aprovado:"Aprovar",
      observacao:"Observação"
    };

    document.getElementById("cabecalho").innerHTML =

    cols.map(c=>{

        let classe="pcp";

        if(c.includes("compras"))
            classe="compras";

        if(c.includes("comex"))
            classe="comex";

        if(
            c.includes("melhor") ||
            c.includes("aprovado") ||
            c.includes("observacao")
        ){
            classe="controladoria";
        }

        return `
        <th class="${classe}">
            ${nomes[c]}
        </th>
        `;

    }).join("")
    +
    `<th class="controladoria">
        Ação
    </th>`;

    let html="";

    dados.forEach((r,i)=>{

        html += `
        <tr
        class="${r.aprovado ? 'aprovadoLinha':''}">
        `;

        cols.forEach(c=>{

            if(c==="melhor_preco"){

                html += `
                <td class="melhor">
                    ${moeda(r[c])}
                </td>
                `;
                return;
            }

            if(
                c==="total_compras" ||
                c==="total_comex"
            ){

                html += `
                <td>
                    ${moeda(r[c])}
                </td>
                `;
                return;
            }

            if(c==="aprovado"){

                html += `
                <td>
                    <input
                    type="checkbox"
                    ${r.aprovado ? "checked":""}
                    onchange="
                    update(
                        ${i},
                        'aprovado',
                        this.checked
                    )">
                </td>
                `;
                return;
            }

            if(c==="observacao"){

                html += `
                <td>
                    <textarea
                    ${perfil!=="controladoria"
                    ? "disabled"
                    : ""}

                    oninput="
                    update(
                        ${i},
                        'observacao',
                        this.value
                    )"
                    >${r.observacao || ""}</textarea>
                </td>
                `;

                return;
            }

            html += `
            <td>

                <input
                value="${r[c] || ''}"

                ${!podeEditar(c)
                ? 'disabled'
                : ''}

                oninput="
                update(
                    ${i},
                    '${c}',
                    this.value
                )">

            </td>
            `;
        });

        html += `
        <td>
            <button
            class="remove"
            onclick="remover(${i})">
            X
            </button>
        </td>
        `;

        html += "</tr>";
    });

    document
    .getElementById("grid")
    .innerHTML = html;
}

//================================
// ENVIO BPM
//================================

document.addEventListener(
"click",
function(e){

    let texto =
    (e.target.innerText || "")
    .toLowerCase();

    if(
        texto.includes("enviar") ||
        texto.includes("salvar")
    ){
        salvar();
    }

});

//================================
// INICIALIZA
//================================

window.onload=function(){

    carregar();

    render();

};

</script>

</body>
</html>
