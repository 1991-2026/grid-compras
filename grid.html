<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
*{
    box-sizing:border-box;
}

html,
body{
    width:100%;
    max-width:100%;
    margin:0;
    padding:0;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    font-size:18px;
    padding:5px;
}

h2{
    font-size:24px;
    margin:0 0 10px;
}

.wrap{
    width:100%;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    border:1px solid #bdbdbd;
    padding:8px;
    font-size:18px;
}

th{
    background:#d9d9d9;
    text-align:center;
}

th:nth-child(1),
td:nth-child(1){
    width:20%;
}

th:nth-child(2),
td:nth-child(2){
    width:30%;
}

th:nth-child(3),
td:nth-child(3){
    width:15%;
}

th:nth-child(4),
td:nth-child(4){
    width:25%;
}

th:nth-child(5),
td:nth-child(5){
    width:10%;
}

input{
    width:100%;
    height:38px;
    font-size:18px;
}

.readonly{
    background:#f5f5f5;
}

.acao{
    text-align:center;
}

button{
    font-size:18px;
    padding:4px 10px;
}
</style>

<script>
function addRow(){
    let t=document.getElementById('tb');
    let r=t.insertRow();
    r.innerHTML=document.getElementById('tpl').innerHTML;
}

function delRow(btn){
    btn.parentNode.parentNode.remove();
}
</script>

</head>

<body>

<h2>SOLICITAÇÃO PCP</h2>

<button type="button" onclick="addRow()">
    + Inserir Linha
</button>

<div class="wrap">

<table>

    <thead>
        <tr>
            <th>CÓD. PRODUTO</th>
            <th>PRODUTO</th>
            <th>QTD</th>
            <th>PRAZO</th>
            <th>AÇÃO</th>
        </tr>
    </thead>

    <tbody id="tb">
        <tr>
            <td>
                <input type="text">
            </td>

            <td>
                <input type="text" class="readonly" readonly>
            </td>

            <td>
                <input type="text">
            </td>

            <td>
                <input type="text">
            </td>

            <td class="acao">
                <button type="button" onclick="delRow(this)">
                    Excluir
                </button>
            </td>
        </tr>
    </tbody>

</table>

</div>

<template id="tpl">

<tr>

    <td>
        <input type="text">
    </td>

    <td>
        <input type="text" class="readonly" readonly>
    </td>

    <td>
        <input type="text">
    </td>

    <td>
        <input type="text">
    </td>

    <td class="acao">
        <button type="button" onclick="delRow(this)">
            Excluir
        </button>
    </td>

</tr>

</template>

</body>
</html>
