<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  padding: 10px;
}

h2 { margin-top: 0; }

.container {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

input {
  width: 100%;
  border: none;
  text-align: center;
}

button {
  padding: 6px;
  cursor: pointer;
}

.add {
  margin-top: 10px;
  background: #2e6da4;
  color: white;
  border: none;
}
</style>

</head>

<body>

<h2>Itens de Cotação</h2>

<div class="container">
<table>
<thead>
<tr id="cabecalho"></tr>
</thead>
<tbody id="grid"></tbody>
</table>
</div>

<button class="add" onclick="addLinha()">+ Adicionar linha</button>

<script>

// =======================
// VARIÁVEIS
// =======================
let perfil = "pcp";
let dados = [];

// =======================
// DETECTAR PERFIL (PROTEGIDO)
// =======================
try {
  if (window.parent && window.parent.WCMAPI?.task?.description) {
    let tarefa = window.parent.WCMAPI.task.description.toLowerCase();

    if(tarefa.includes("compras")) perfil = "compras";
    else if(tarefa.includes("comex")) perfil = "comex";
    else if(tarefa.includes("control")) perfil = "controladoria";
  }
} catch(e){}

// =======================
// PEGAR CAMPO BPM COM SEGURANÇA
// =======================
function getCampo(){
  try{
    if(window.parent && window.parent.document){
      return window.parent.document.getElementsByName("grid_dados")[0];
    }
  }catch(e){}
  return null;
}

// =======================
// CARREGAR DADOS
// =======================
function carregar(){

  try{
    let campo = getCampo();

    if(campo && campo.value){
      dados = JSON.parse(campo.value);
    }
  }catch(e){
    console.log("Erro ao carregar", e);
    dados = [];
  }

}

// =======================
// SALVAR DADOS
// =======================
function salvar(){

  try{
    let campo = getCampo();

    if(campo){
      campo.value = JSON.stringify(dados);
      campo.dispatchEvent(new Event("change"));
    }
  }catch(e){
    console.log("Erro ao salvar", e);
  }

}

// =======================
// COLUNAS
// =======================
function colunas(){

  let cols = ["codigo","descricao","qtd","prazo"];

  if(perfil === "compras"){
    cols.push("preco_compras","prazo_compras");
  }

  if(perfil === "comex"){
    cols.push("preco_comex","prazo_comex");
  }

  if(perfil === "controladoria"){
    cols.push("preco_compras","preco_comex","melhor","aprovado");
  }

  return cols;
}

// =======================
// PERMISSÃO
// =======================
function podeEditar(c){

  if(perfil==="pcp") return ["codigo","descricao","qtd","prazo"].includes(c);
  if(perfil==="compras") return c.includes("compras");
  if(perfil==="comex") return c.includes("comex");
  if(perfil==="controladoria") return ["aprovado"].includes(c);

  return false;
}

// =======================
// AÇÕES
// =======================
function addLinha(){
  dados.push({});
  salvar();
  render();
}

function update(i,c,v){

  dados[i][c] = v;

  let c1 = parseFloat(dados[i].preco_compras || 999999);
  let c2 = parseFloat(dados[i].preco_comex || 999999);

  dados[i].melhor = Math.min(c1,c2);

  salvar();
}

function remover(i){
  dados.splice(i,1);
  salvar();
  render();
}

// =======================
// RENDER
// =======================
function render(){

  let cols = colunas();

  let nomes = {
    codigo:"Código",
    descricao:"Descrição",
    qtd:"Qtd",
    prazo:"Prazo",
    preco_compras:"Preço Compras",
    prazo_compras:"Prazo Compras",
    preco_comex:"Preço COMEX",
    prazo_comex:"Prazo COMEX",
    melhor:"Melhor Preço",
    aprovado:"Aprovar"
  };

  document.getElementById("cabecalho").innerHTML =
    cols.map(c => `<th>${nomes[c]}</th>`).join("") + "<th>Ação</th>";

  let html = "";

  dados.forEach((r,i)=>{

    html += "<tr>";

    cols.forEach(c=>{

      if(c==="aprovado"){
        html += `<td>
          <input type="checkbox" ${r.aprovado?"checked":""}
          onchange="update(${i},'aprovado',this.checked)">
        </td>`;
      } else {

        let val = r[c] || "";

        html += `<td>
        <input value="${val}"
        ${!podeEditar(c) ? "disabled" : ""}
        oninput="update(${i},'${c}',this.value)">
        </td>`;
      }

    });

    html += `<td><button onclick="remover(${i})">X</button></td>`;
    html += "</tr>";
  });

  document.getElementById("grid").innerHTML = html;
}

// =======================
// FORÇA SALVAR AO ENVIAR
// =======================
document.addEventListener("click", function(e){

  let texto = (e.target.innerText || "").toLowerCase();

  if(texto.includes("enviar")){
    salvar();
  }

});

// =======================
// INIT SEGURO
// =======================
window.onload = function(){
  carregar();
  render();
};

</script>

</body>
</html>
