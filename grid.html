<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grid Compras</title>

<style>
body { font-family: Arial; padding: 20px; }

table { width: 100%; border-collapse: collapse; }

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

input { width: 100%; border: none; text-align: center; }

button {
  padding: 6px 10px;
  cursor: pointer;
}

.add {
  margin-top: 10px;
  background: #2e6da4;
  color: white;
  border: none;
}
</style>

</head>

<body>

<h2>Itens de Cotação ✅</h2>

<table>
<thead>
<tr id="cabecalho"></tr>
</thead>
<tbody id="grid"></tbody>
</table>

<button class="add" onclick="addLinha()">+ Adicionar linha</button>

<script>

// =======================
// PERFIL
// =======================
const params = new URLSearchParams(window.location.search);
let perfil = params.get("perfil") || "pcp";

// =======================
// DADOS
// =======================
let dados = [];
let produtos = [];

// =======================
// SALVAR (WCMAPI + LOCAL)
// =======================
function salvar(){

  let json = JSON.stringify(dados);

  // salva no navegador (backup)
  localStorage.setItem("grid_dados", json);

  // tenta salvar no BPM
  try{
    if (parent && parent.WCMAPI && parent.WCMAPI.form){
      parent.WCMAPI.form.setValue("grid_dados", json);
    }
  }catch(e){
    console.log("WCMAPI não disponível");
  }
}

// =======================
// CARREGAR DADOS
// =======================
function carregar(){

  let json = "";

  // tenta carregar do BPM
  try{
    if (parent && parent.WCMAPI && parent.WCMAPI.form){
      json = parent.WCMAPI.form.getValue("grid_dados");
    }
  }catch(e){
    console.log("Erro WCMAPI");
  }

  // fallback para localStorage
  if(!json){
    json = localStorage.getItem("grid_dados");
  }

  if(json){
    dados = JSON.parse(json);
  }
}

// =======================
// CARREGAR CSV
// =======================
fetch("PRODUTOS.csv")
.then(r => r.text())
.then(text=>{
  let linhas = text.split(/\r?\n/);

  linhas.forEach((l,i)=>{
    if(i===0 || !l.trim()) return;

    let sep = l.includes(";") ? ";" : ",";
    let c = l.split(sep);

    produtos.push({
      codigo: c[0].trim(),
      descricao: c[1].trim()
    });
  });
});

// =======================
// COLUNAS
// =======================
function colunas(){

  let cols = [];

  if(perfil !== "controladoria"){
    cols.push({c:"codigo", t:"Código"});
    cols.push({c:"descricao", t:"Descrição"});
    cols.push({c:"qtd", t:"Qtd"});
    cols.push({c:"prazo_pcp", t:"Prazo"});
  }

  if(perfil === "compras"){
    cols.push({c:"preco_compras", t:"Preço Compras"});
    cols.push({c:"prazo_compras", t:"Prazo Compras"});
  }

  if(perfil === "comex"){
    cols.push({c:"preco_comex", t:"Preço COMEX"});
    cols.push({c:"prazo_comex", t:"Prazo COMEX"});
  }

  if(perfil === "controladoria"){
    cols.push({c:"preco_compras", t:"Preço Compras"});
    cols.push({c:"preco_comex", t:"Preço COMEX"});
    cols.push({c:"melhor_preco", t:"Melhor Preço"});
    cols.push({c:"aprovado", t:"Aprovar"});
  }

  cols.push({c:"acao", t:"Ação"});

  return cols;
}

// =======================
// PERMISSÃO
// =======================
function podeEditar(c){

  if(perfil==="pcp"){
    return ["codigo","descricao","qtd","prazo_pcp"].includes(c);
  }

  if(perfil==="compras"){
    return c.includes("compras");
  }

  if(perfil==="comex"){
    return c.includes("comex");
  }

  if(perfil==="controladoria"){
    return ["aprovado"].includes(c);
  }

  return false;
}

// =======================
// ADD
// =======================
function addLinha(){
  dados.push({});
  salvar();
  render();
}

// =======================
// UPDATE
// =======================
function update(i,c,v){

  dados[i][c] = v;

  // auto descrição
  if(c==="codigo"){
    let p = produtos.find(x => x.codigo == v);
    dados[i].descricao = p ? p.descricao : "";
  }

  // melhor preço
  let c1 = parseFloat(dados[i].preco_compras || 999999);
  let c2 = parseFloat(dados[i].preco_comex || 999999);

  dados[i].melhor_preco = Math.min(c1, c2);

  salvar();
  render();
}

// =======================
// REMOVE
// =======================
function remover(i){
  dados.splice(i,1);
  salvar();
  render();
}

// =======================
// RENDER
// =======================
function render(){

  let cols = colunas();

  let head = cols.map(c => `<th>${c.t}</th>`).join("");
  document.getElementById("cabecalho").innerHTML = head;

  let html = "";

  dados.forEach((r,i)=>{

    html += "<tr>";

    cols.forEach(col=>{

      if(col.c==="acao"){
        html += `<td><button onclick="remover(${i})">X</button></td>`;
      }

      else if(col.c==="aprovado"){
        html += `<td>
          <input type="checkbox" ${r.aprovado?"checked":""}
          onchange="update(${i},'aprovado',this.checked)">
        </td>`;
      }

      else{
        let val = r[col.c] || "";

        html += `<td>
          <input value="${val}"
          ${!podeEditar(col.c) ? "disabled" : ""}
          onchange="update(${i},'${col.c}',this.value)">
        </td>`;
      }

    });

    html += "</tr>";
  });

  document.getElementById("grid").innerHTML = html;
}

// =======================
// INIT
// =======================
carregar();
render();

</script>

</body>
</html>
