<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grid Compras</title>

<style>
body { font-family: Arial; padding: 20px; }

table { width: 100%; border-collapse: collapse; }

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

input { width: 100%; border: none; text-align: center; }

button {
  padding: 6px 10px;
  cursor: pointer;
}

.add {
  margin-top: 10px;
  background: #2e6da4;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h2>Itens de Cotação</h2>

<table>
<thead>
<tr id="cabecalho"></tr>
</thead>
<tbody id="grid"></tbody>
</table>

<button class="add" onclick="addLinha()">+ Adicionar linha</button>

<script>

// =======================
// DETECTAR PERFIL AUTOMÁTICO
// =======================
let perfil = "pcp";

try {
  let task = parent?.WCMAPI?.task?.description || "";

  if(task.toLowerCase().includes("compras")) perfil = "compras";
  else if(task.toLowerCase().includes("comex")) perfil = "comex";
  else if(task.toLowerCase().includes("control")) perfil = "controladoria";
  else perfil = "pcp";

} catch(e){}

// =======================
// DADOS
// =======================
let dados = [];

// =======================
// SALVAR
// =======================
function salvar(){
  localStorage.setItem("grid_dados", JSON.stringify(dados));
}

// =======================
// CARREGAR LOCAL
// =======================
function carregar(){
  let json = localStorage.getItem("grid_dados");
  if(json){
    dados = JSON.parse(json);
  }
}

// =======================
// CARREGAR DO BPM
// =======================
function carregarDoBPM(){

  try{
    if(parent && parent.WCMAPI && parent.WCMAPI.form){

      let json = parent.WCMAPI.form.getValue("grid_dados");

      if(json && json !== ""){
        dados = JSON.parse(json);
        localStorage.setItem("grid_dados", json);
      }

    }
  }catch(e){}
}

// =======================
// COLUNAS POR PERFIL
// =======================
function colunas(){

  let cols = [];

  if(perfil !== "controladoria"){
    cols.push("codigo","descricao","qtd","prazo");
  }

  if(perfil === "compras"){
    cols.push("preco_compras","prazo_compras");
  }

  if(perfil === "comex"){
    cols.push("preco_comex","prazo_comex");
  }

  if(perfil === "controladoria"){
    cols.push("preco_compras","preco_comex","melhor","aprovado");
  }

  return cols;
}

// =======================
// EDIÇÃO
// =======================
function podeEditar(c){

  if(perfil === "pcp") return ["codigo","descricao","qtd","prazo"].includes(c);

  if(perfil === "compras") return c.includes("compras");

  if(perfil === "comex") return c.includes("comex");

  if(perfil === "controladoria") return ["aprovado"].includes(c);

  return false;
}

// =======================
// ADD
// =======================
function addLinha(){
  dados.push({});
  salvar();
  render();
}

// =======================
// UPDATE
// =======================
function update(i,c,v){

  dados[i][c] = v;

  let c1 = parseFloat(dados[i].preco_compras || 999999);
  let c2 = parseFloat(dados[i].preco_comex || 999999);

  dados[i].melhor = Math.min(c1,c2);

  salvar();
  render();
}

// =======================
// REMOVER
// =======================
function remover(i){
  dados.splice(i,1);
  salvar();
  render();
}

// =======================
// RENDER
// =======================
function render(){

  let cols = colunas();

  let nomes = {
    codigo:"Código",
    descricao:"Descrição",
    qtd:"Qtd",
    prazo:"Prazo",
    preco_compras:"Preço Compras",
    prazo_compras:"Prazo Compras",
    preco_comex:"Preço COMEX",
    prazo_comex:"Prazo COMEX",
    melhor:"Melhor Preço",
    aprovado:"Aprovar"
  };

  // cabeçalho
  let head = cols.map(c => `<th>${nomes[c]}</th>`).join("");
  head += "<th>Ação</th>";

  document.getElementById("cabecalho").innerHTML = head;

  let html = "";

  dados.forEach((r,i)=>{

    html += "<tr>";

    cols.forEach(c=>{

      if(c==="aprovado"){
        html += `<td>
        <input type="checkbox" ${r.aprovado?"checked":""}
        onchange="update(${i},'aprovado',this.checked)">
        </td>`;
      }
      else{

        let val = r[c] || "";

        html += `<td>
        <input value="${val}"
        ${!podeEditar(c) ? "disabled" : ""}
        onchange="update(${i},'${c}',this.value)">
        </td>`;
      }

    });

    html += `<td><button onclick="remover(${i})">X</button></td>`;
    html += "</tr>";
  });

  document.getElementById("grid").innerHTML = html;
}

// =======================
// INIT
// =======================
carregar();
carregarDoBPM();
render();

</script>

</body>
</html>
``
