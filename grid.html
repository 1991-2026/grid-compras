<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Grid de Cotações</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

h2{
    margin-bottom:20px;
    color:#1f2937;
}

.container{
    background:#fff;
    border-radius:12px;
    overflow:auto;
    box-shadow:0 3px 15px rgba(0,0,0,.12);
}

table{
    width:100%;
    min-width:1800px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #d1d5db;
    padding:6px;
}

th{
    color:white;
    font-size:12px;
    text-transform:uppercase;
}

input, textarea{

    width:100%;
    border:none;
    padding:6px;
    font-size:13px;
    outline:none;

}

input:disabled,
textarea:disabled{

    background:#f3f4f6;

}

textarea{
    min-height:60px;
    resize:vertical;
}

button{

    cursor:pointer;
    border:none;
    border-radius:6px;
    padding:8px 12px;

}

.add{
    margin-top:15px;
    background:#2563eb;
    color:white;
}

.remove{
    background:#dc2626;
    color:white;
}

.pcp{
    background:#0F4C81;
}

.compras{
    background:#198754;
}

.comex{
    background:#d97706;
}

.controladoria{
    background:#6f42c1;
}

.melhor{
    background:#dcfce7;
    font-weight:bold;
    color:#166534;
}

.status{
    padding:10px;
    color:white;
    border-radius:8px;
    margin-bottom:15px;
    background:#0ea5e9;
}

</style>
</head>
<body>

<div class="status">
MODO TESTE ATIVO - Perfil Controladoria
</div>

<h2>Grid de Cotações</h2>

<div class="container">

<table>

<thead>
<tr id="cabecalho"></tr>
</thead>

<tbody id="grid"></tbody>

</table>

</div>

<button class="add" onclick="addLinha()">
+ Adicionar Linha
</button>

<script>

let perfil = "controladoria";
let dados = [];

function moeda(v){

    return Number(v || 0)
    .toLocaleString("pt-BR",{
        style:"currency",
        currency:"BRL"
    });

}

function colunas(){

return [

"codigo",
"descricao",
"qtd",

"setor_compras",
"fornecedor_compras",
"descricao_fornecedor_compras",
"preco_compras",
"total_compras",
"prazo_compras",

"setor_comex",
"fornecedor_comex",
"descricao_fornecedor_comex",
"preco_comex",
"total_comex",
"prazo_comex",

"melhor_preco",
"fornecedor_aprovado",
"aprovado",
"observacao"

];

}

const nomes = {

codigo:"Código",
descricao:"Descrição",
qtd:"Quantidade",

setor_compras:"Setor Compras",
fornecedor_compras:"Cód Forn Compras",
descricao_fornecedor_compras:"Fornecedor Compras",
preco_compras:"Preço Unit Compras",
total_compras:"Total Compras",
prazo_compras:"Prazo Compras",

setor_comex:"Setor COMEX",
fornecedor_comex:"Cód Forn COMEX",
descricao_fornecedor_comex:"Fornecedor COMEX",
preco_comex:"Preço Unit COMEX",
total_comex:"Total COMEX",
prazo_comex:"Prazo COMEX",

melhor_preco:"Melhor Preço",
fornecedor_aprovado:"Fornecedor Vencedor",
aprovado:"Aprovação",
observacao:"Observação"

};

function addLinha(){

dados.push({

codigo:"",
descricao:"",
qtd:0,

setor_compras:"",
fornecedor_compras:"",
descricao_fornecedor_compras:"",
preco_compras:0,
total_compras:0,
prazo_compras:"",

setor_comex:"",
fornecedor_comex:"",
descricao_fornecedor_comex:"",
preco_comex:0,
total_comex:0,
prazo_comex:"",

melhor_preco:0,
fornecedor_aprovado:"",
aprovado:false,
observacao:""

});

render();

}

function remover(i){

dados.splice(i,1);

render();

}

function update(i,c,v){

dados[i][c]=v;

let qtd =
parseFloat(dados[i].qtd || 0);

let compra =
parseFloat(dados[i].preco_compras || 0);

let comex =
parseFloat(dados[i].preco_comex || 0);

dados[i].total_compras =
(qtd * compra).toFixed(2);

dados[i].total_comex =
(qtd * comex).toFixed(2);

if(compra>0 && comex>0){

dados[i].melhor_preco =
Math.min(compra,comex);

dados[i].fornecedor_aprovado =
(compra<comex)
?
dados[i].descricao_fornecedor_compras
:
dados[i].descricao_fornecedor_comex;

}

render();

}

function classeColuna(c){

if(c.includes("compras"))
return "compras";

if(c.includes("comex"))
return "comex";

if(
c.includes("melhor") ||
c.includes("aprovado") ||
c.includes("observacao")
)
return "controladoria";

return "pcp";

}

function render(){

let cols = colunas();

document.getElementById("cabecalho").innerHTML =

cols.map(c=>

`<th class="${classeColuna(c)}">
${nomes[c]}
</th>`

).join("")

+

`<th class="controladoria">
Ação
</th>`;

let html="";

dados.forEach((r,i)=>{

html+=`<tr>`;

cols.forEach(c=>{

if(c==="melhor_preco"){

html+=`
<td class="melhor">
${moeda(r[c])}
</td>
`;

return;

}

if(
c==="total_compras" ||
c==="total_comex"
){

html+=`
<td>
${moeda(r[c])}
</td>
`;

return;

}

if(c==="aprovado"){

html+=`
<td style="text-align:center">

<input
type="checkbox"
${r.aprovado ? "checked":""}
onchange="
update(${i},
'aprovado',
this.checked)">
</td>
`;

return;

}

if(c==="observacao"){

html+=`
<td>

<textarea
oninput="
update(
${i},
'observacao',
this.value)">
${r[c] || ""}
</textarea>

</td>
`;

return;

}

html+=`

<td>

<input

value="${r[c] || ''}"

oninput="
update(
${i},
'${c}',
this.value
)">

</td>

`;

});

html+=`

<td>

<button
class="remove"
onclick="remover(${i})">

X

</button>

</td>

`;

html+="</tr>";

});

document.getElementById("grid").innerHTML=html;

}

addLinha();

</script>

</body>
</html>
