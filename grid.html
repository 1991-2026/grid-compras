<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grid de Cotações Senior BPM</title>
<style>
body{font-family:Segoe UI,Arial;margin:15px}
button{background:#198754;color:#fff;border:0;padding:10px 14px;border-radius:4px;cursor:pointer;margin-bottom:10px}
.table-wrap{overflow:auto}
table{border-collapse:collapse;min-width:2200px;width:100%}
th,td{border:1px solid #d0d0d0;padding:4px}
input,select{width:100%;box-sizing:border-box;border:0;padding:5px}
.top-pcp{background:#175a92;color:#fff}.top-compras{background:#148f43;color:#fff}.top-comex{background:#e67e00;color:#fff}.top-ctrl{background:#7b2cbf;color:#fff}
.sub{background:#f1f1f1;font-weight:bold}
.readonly{background:#f4f4f4}
</style>
<script>
function adicionarLinha(){
 const tb=document.getElementById('tb');
 const nova=tb.rows[0].cloneNode(true);
 nova.querySelectorAll('input').forEach(i=>i.value='');
 nova.querySelectorAll('select').forEach(s=>s.selectedIndex=0);
 tb.appendChild(nova);
}
function excluir(btn){if(document.getElementById('tb').rows.length>1) btn.closest('tr').remove();}
</script>
</head>
<body>
<h2>Grid de Cotações - Senior BPM</h2>
<button onclick='adicionarLinha()'>+ Inserir Nova Cotação</button>
<div class='table-wrap'>
<table>
<thead>
<tr>
<th colspan='4' class='top-pcp'>PCP</th>
<th colspan='6' class='top-compras'>COMPRAS</th>
<th colspan='6' class='top-comex'>COMEX</th>
<th colspan='4' class='top-ctrl'>CONTROLADORIA</th>
<th rowspan='2' class='top-ctrl'>Ação</th>
</tr>
<tr class='sub'>
<th>Código Produto</th><th>Descrição Produto</th><th>Quantidade</th><th>Prazo</th>
<th>Cód. Fornecedor</th><th>Fornecedor</th><th>Quantidade</th><th>Preço Unitário</th><th>Preço Total</th><th>Prazo</th>
<th>Cód. Fornecedor</th><th>Fornecedor</th><th>Quantidade</th><th>Preço Unitário</th><th>Preço Total</th><th>Prazo</th>
<th>Melhor Preço</th><th>Economia</th><th>Aprovação</th><th>Observação</th>
</tr>
</thead>
<tbody id='tb'>
<tr>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input type='number'></td>
<td><input></td>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input type='number'></td>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input></td>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input type='number'></td>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input></td>
<td><input class='readonly' readonly></td>
<td><input class='readonly' readonly></td>
<td><select><option></option><option>Aprovado</option><option>Reprovado</option></select></td>
<td><input></td>
<td><button type='button' onclick='excluir(this)' style='background:#dc3545'>Excluir</button></td>
</tr>
</tbody>
</table>
</div>
</body></html>
