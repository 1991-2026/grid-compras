<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitação PCP</title>

<!-- BPM IMPORTS -->
<script src="https://cdnjs..5.14/iframeResizer.contentWindow.min.js"></script>
.br/platform/4.7.3/js/workflow-cockpit.js"></script>
<!-- BPM IMPORTS -->

<style>

:root{
    --navy:#1B3B6F;
    --navy-dark:#122A52;
    --border:#BDBDBD;
    --border-light:#E3E3E3;
    --surface:#FFFFFF;
    --muted:#6C7A89;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Segoe UI,Tahoma,sans-serif;
    background:#eef0f2;
}

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    background:#fff;
    border:1px solid #e3e3e3;
    border-radius:6px;
    padding:16px 24px;
    margin-bottom:20px;
}

.brand-mark{
    font-size:30px;
    font-weight:800;
    color:var(--navy);
    font-style:italic;
}

.brand-divider{
    width:1px;
    height:40px;
    background:#e3e3e3;
}

.page-heading h1{
    margin:0;
    color:var(--navy-dark);
}

.page-heading p{
    margin:4px 0 0;
    color:var(--muted);
}

.toolbar{
    margin-bottom:15px;
}

.btn{
    padding:10px 15px;
    border:1px solid #BDBDBD;
    border-radius:6px;
    background:white;
    cursor:pointer;
    font-weight:600;
}

.btn:hover{
    background:#f4f4f4;
}

.btn-danger{
    color:#B3261E;
}

.card{
    background:white;
    border-radius:6px;
    border:1px solid #e3e3e3;
    padding:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#d9d9d9;
    padding:10px;
    border:1px solid #BDBDBD;
}

td{
    padding:5px;
    border:1px solid #E3E3E3;
}

input{
    width:100%;
    height:38px;
    border:1px solid #BDBDBD;
    border-radius:4px;
    padding:5px 10px;
}

.produto{
    background:#f5f6f7;
}

.acao{
    width:120px;
}

</style>

<script>

const URL_PRODUTOS = "SUA_URL_ODATA_AQUI";

function resizeFormulario(){

    try{
        if(window.parentIFrame){
            window.parentIFrame.size();
        }
    }catch(e){
        console.log(e);
    }
}

async function buscarProduto(campo){

    const codigo = campo.value.trim();

    if(!codigo){
        return;
    }

    const linha = campo.closest("tr");
    const produto = linha.querySelector(".produto");

    try{

        const response = await fetch(
            `${URL_PRODUTOS}?$filter=codigo eq '${codigo}'`
        );

        const dados = await response.json();

        if(dados.value && dados.value.length){

            produto.value =
                dados.value[0].descricao || "";

        }else{

            produto.value = "";

            alert("Código não encontrado");

        }

    }catch(e){

        console.error(e);

        produto.value = "";

    }

    resizeFormulario();
}

function addRow(){

    const tbody =
        document.getElementById("tb");

    const novaLinha =
        document.createElement("tr");

    novaLinha.innerHTML = `
        <td>
            <input type="text"
                   name="codigo"
                   onblur="buscarProduto(this)">
        </td>

        <td>
            <input type="text"
                   class="produto"
                   readonly>
        </td>

        <td>
            <input type="text"
                   name="qtd">
        </td>

        <td>
            <input type="text"
                   name="prazo">
        </td>

        <td class="acao">
            <button
                type="button"
                class="btn btn-danger"
                onclick="delRow(this)">
                Excluir
            </button>
        </td>
    `;

    tbody.appendChild(novaLinha);

    resizeFormulario();
}

function delRow(botao){

    const linha = botao.closest("tr");

    const tbody =
        document.getElementById("tb");

    if(tbody.rows.length > 1){

        linha.remove();

    }

    resizeFormulario();
}

window.onload = function(){

    resizeFormulario();

    if(window.ResizeObserver){

        new ResizeObserver(function(){

            resizeFormulario();

        }).observe(document.body);

    }

};

</script>

</head>

<body>

<header class="app-header">

    <div class="brand-mark">
        SUGGAR
    </div>

    <div class="brand-divider"></div>

    <div class="page-heading">
        <h1>SOLICITAÇÃO PCP</h1>
        <p>Planejamento e Controle da Produção</p>
    </div>

</header>

<div class="toolbar">

    <button
        type="button"
        class="btn"
        onclick="addRow()">

        + Inserir Linha

    </button>

</div>

<div class="card">

<table>

    <thead>

        <tr>
            <th>CÓD. PRODUTO</th>
            <th>PRODUTO</th>
            <th>QTD</th>
            <th>PRAZO</th>
            <th>AÇÃO</th>
        </tr>

    </thead>

    <tbody id="tb">

        <tr>

            <td>
                <input
                    type="text"
                    name="codigo"
                    onblur="buscarProduto(this)">
            </td>

            <td>
                <input
                    type="text"
                    class="produto"
                    readonly>
            </td>

            <td>
                <input
                    type="text"
                    name="qtd">
            </td>

            <td>
                <input
                    type="text"
                    name="prazo">
            </td>

            <td class="acao">

                <button
                    type="button"
                    class="btn btn-danger"
                    onclick="delRow(this)">

                    Excluir

                </button>

            </td>

        </tr>

    </tbody>

</table>

</div>

</body>
</html>
