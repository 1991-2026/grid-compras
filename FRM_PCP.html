<div style="font-family:'Segoe UI',Arial,sans-serif;padding:20px;background:#f4f6f9;">

    <div style="
        background:#fff;
        border-radius:12px;
        padding:30px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
        display:flex;
        align-items:center;
        gap:25px;
        margin-bottom:20px;">

        <div style="
            font-size:42px;
            font-weight:800;
            font-style:italic;
            color:#0B2E63;
            border-right:1px solid #ddd;
            padding-right:20px;">
            SUGGAR
        </div>

        <div>
            <div style="
                font-size:36px;
                font-weight:700;
                color:#0B2E63;">
                SOLICITAÇÃO PCP
            </div>

            <div style="
                color:#6b7280;
                margin-top:6px;
                font-size:16px;">
                Planejamento e Controle da Produção
            </div>
        </div>

    </div>

    <button
        type="button"
        onclick="adicionarLinha();"
        style="
            background:#0B2E63;
            color:white;
            border:none;
            border-radius:8px;
            padding:12px 20px;
            cursor:pointer;
            font-weight:600;
            margin-bottom:20px;">

        + Inserir Linha

    </button>

    <div style="
        background:white;
        border-radius:12px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
        padding:15px;">

        <table
            id="tabelaPcp"
            style="
                width:100%;
                border-collapse:collapse;">

            <thead>

                <tr style="background:#0B2E63;">

                    <th style="padding:12px;color:white;">
                        CÓD. PRODUTO
                    </th>

                    <th style="padding:12px;color:white;">
                        PRODUTO
                    </th>

                    <th style="padding:12px;color:white;">
                        QTD
                    </th>

                    <th style="padding:12px;color:white;">
                        PRAZO
                    </th>

                    <th style="padding:12px;color:white;">
                        AÇÃO
                    </th>

                </tr>

            </thead>

            <tbody id="tb">

                <tr>

                    <td style="padding:8px;">
                        <input style="width:100%;height:40px;">
                    </td>

                    <td style="padding:8px;">
                        <input
                            readonly
                            style="
                                width:100%;
                                height:40px;
                                background:#f3f4f6;">
                    </td>

                    <td style="padding:8px;">
                        <input style="width:100%;height:40px;">
                    </td>

                    <td style="padding:8px;">
                        <input style="width:100%;height:40px;">
                    </td>

                    <td style="padding:8px;text-align:center;">

                        <button
                            type="button"
                            onclick="excluirLinha(this);"
                            style="
                                background:#dc2626;
                                color:white;
                                border:none;
                                border-radius:6px;
                                padding:8px 12px;
                                cursor:pointer;">

                            Excluir

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

function adicionarLinha(){

    var tabela =
        document.getElementById("tb");

    var linha =
        document.createElement("tr");

    linha.innerHTML = `
        <td style="padding:8px;">
            <input style="width:100%;height:40px;">
        </td>

        <td style="padding:8px;">
            <input readonly
                   style="width:100%;height:40px;background:#f3f4f6;">
        </td>

        <td style="padding:8px;">
            <input style="width:100%;height:40px;">
        </td>

        <td style="padding:8px;">
            <input style="width:100%;height:40px;">
        </td>

        <td style="padding:8px;text-align:center;">
            <button
                type="button"
                onclick="excluirLinha(this);"
                style="
                    background:#dc2626;
                    color:white;
                    border:none;
                    border-radius:6px;
                    padding:8px 12px;">
                Excluir
            </button>
        </td>
    `;

    tabela.appendChild(linha);
}

function excluirLinha(botao){

    var linhas =
        document.querySelectorAll("#tb tr");

    if(linhas.length > 1){

        botao.closest("tr").remove();

    }
}

</script>
