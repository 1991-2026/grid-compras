<style>

.pcp-container{
    font-family:'Segoe UI',Arial,sans-serif;
    padding:20px;
}

.pcp-title{
    color:#0B3A82;
    font-size:28px;
    font-weight:600;
    margin-bottom:5px;
}

.pcp-subtitle{
    color:#6c757d;
    font-size:14px;
    margin-bottom:20px;
}

.btn-add{
    background:#0B3A82;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:10px 18px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
}

.btn-delete{
    background:#D9534F;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:7px 12px;
    font-size:12px;
    cursor:pointer;
}

.tabela-pcp{
    width:100%;
    border-collapse:collapse;
    background:#FFF;
}

.tabela-pcp th{
    background:#F3F3F3;
    border:1px solid #DDD;
    padding:12px;
    font-weight:600;
    text-align:center;
}

.tabela-pcp td{
    border:1px solid #DDD;
    padding:8px;
}

.tabela-pcp input{
    width:100%;
    height:36px;
    border:1px solid #CCC;
    border-radius:4px;
    padding:0 8px;
}

.produto{
    background:#F5F7FA;
    font-weight:500;
}

.total-itens{
    margin-top:15px;
    color:#0B3A82;
    font-weight:600;
}

</style>

<div class="pcp-container">

    <div class="pcp-title">
        Solicitação PCP
    </div>

    <div class="pcp-subtitle">
        Planejamento e Controle da Produção
    </div>

    <button
        type="button"
        id="btnInserir"
        class="btn-add">

        + Inserir Linha

    </button>

    <br><br>

    <table class="tabela-pcp">

        <thead>
            <tr>
                <th style="width:15%">Cód. Produto</th>
                <th style="width:40%">Produto</th>
                <th style="width:15%">Qtd</th>
                <th style="width:20%">Prazo</th>
                <th style="width:10%">Ação</th>
            </tr>
        </thead>

        <tbody id="tb">

            <tr>

                <td>
                    <input
                        type="text"
                        class="codigo-produto"
                        onblur="buscarProduto(this)">
                </td>

                <td>
                    <input
                        type="text"
                        class="produto"
                        readonly>
                </td>

                <td>
                    <input
                        type="number"
                        min="1">
                </td>

                <td>
                    <input
                        type="date">
                </td>

                <td style="text-align:center">

                    <button
                        type="button"
                        class="btn-delete excluir">

                        Excluir

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

    <div class="total-itens">
        Total de itens:
        <span id="totalItens">1</span>
    </div>

<input type="hidden" id="jsonItens" name="jsonItens">
<input type="hidden" id="assuntoSolicitacao" name="assuntoSolicitacao">

</div>

<script>

console.log("FRM_PCP carregado");

var produtos = [

{
 codigo:"TP62BM",
 descricao:"Dep Suggar Vega 60CM 220V C/Lum"
},
{
 codigo:"AD2422PT",
 descricao:"Adega Nantes Suggar 24 G 220V"
},
{
 codigo:"CT2822BR",
 descricao:"Centrifuga Suggar Branca 220V"
},
{
 codigo:"DP62IX",
 descricao:"Depurador Orion 60CM Inox 220V"
},
{
 codigo:"EF8662CXBR",
 descricao:"Espremedor de Frutas Suggar 220V CX C/12"
},
{
 codigo:"FE4222BR",
 descricao:"Forno Eletrico Suggar Branco 42 Litros 220V"
},
{
 codigo:"105008",
 descricao:"Suporte de fixacao do queimador"
}

];

function buscarProduto(campo){

    var codigo =
        campo.value
        .trim()
        .toUpperCase();

    var linha =
        campo.closest('tr');

    var campoProduto =
        linha.querySelector('.produto');

    campoProduto.value = '';

    if(!codigo){
        return;
    }

    var encontrado =
        produtos.find(function(item){

            return item.codigo === codigo;

        });

    if(encontrado){

        campoProduto.value =
            encontrado.descricao;

        campoProduto.style.color =
            '#333';

    }else{

        campoProduto.value =
            'PRODUTO NÃO ENCONTRADO';

        campoProduto.style.color =
            '#D9534F';

    }

}

function atualizarTotal(){

    document.getElementById(
        'totalItens'
    ).innerHTML =

    document.querySelectorAll(
        '#tb tr'
    ).length;

}

document
.getElementById('btnInserir')
.onclick = function(){

    var tbody =
        document.getElementById('tb');

    var linha =
        document.createElement('tr');

    linha.innerHTML = `

        <td>
            <input
                type="text"
                class="codigo-produto"
                onblur="buscarProduto(this)">
        </td>

        <td>
            <input
                type="text"
                class="produto"
                readonly>
        </td>

        <td>
            <input
                type="number"
                min="1">
        </td>

        <td>
            <input
                type="date">
        </td>

        <td style="text-align:center">
            <button
                type="button"
                class="btn-delete excluir">
                Excluir
            </button>
        </td>

    `;

tbody.appendChild(linha);

atualizarTotal();
atualizarDadosProcesso();

};

function atualizarDadosProcesso(){

    var itens = [];

    document
        .querySelectorAll('#tb tr')
        .forEach(function(linha){

            var campos =
                linha.querySelectorAll('input');

            itens.push({

                codigo: campos[0].value,
                produto: campos[1].value,
                quantidade: campos[2].value,
                prazo: campos[3].value

            });

        });

    document.getElementById(
        'jsonItens'
    ).value =
        JSON.stringify(itens);

}

document.addEventListener(
    'click',
    function(e){

        if(
            e.target.classList.contains(
                'excluir'
            )
        ){

            var linhas =
                document.querySelectorAll(
                    '#tb tr'
                );

            if(linhas.length > 1){

               e.target
    .closest('tr')
    .remove();

atualizarTotal();
atualizarDadosProcesso();

            }

        }

    }
);

window.addEventListener('load', function(){

    try{

        if(window.parent){

            window.parent.postMessage({
                type:'loaded'
            }, '*');

        }

    }catch(e){

        console.log(e);

    }

});

console.log("FORMULARIO PCP CARREGADO");

window.addEventListener("load", function(){

    console.log("LOAD EXECUTADO");

});

</script>
