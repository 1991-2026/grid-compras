<style>
.container-pcp{
    width:100%;
    padding:15px;
    font-family:Segoe UI,Tahoma,sans-serif;
}

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
    padding:15px;
    border:1px solid #DDD;
    border-radius:5px;
    background:#FFF;
}

.brand{
    font-size:34px;
    font-weight:bold;
    font-style:italic;
    color:#163A70;
}

.titulo{
    border-left:1px solid #DDD;
    padding-left:20px;
}

.titulo h2{
    margin:0;
    color:#163A70;
}

.titulo span{
    color:#666;
}

.toolbar{
    margin-bottom:15px;
}

.btn{
    padding:8px 18px;
    border:1px solid #BBB;
    background:#FFF;
    cursor:pointer;
    border-radius:4px;
}

.btn:hover{
    background:#F5F5F5;
}

.btn-danger{
    color:#B00020;
}

.card{
    border:1px solid #DDD;
    border-radius:5px;
    padding:10px;
    background:#FFF;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#D9D9D9;
    border:1px solid #BDBDBD;
    padding:10px;
}

td{
    border:1px solid #E3E3E3;
    padding:6px;
}

input{
    width:100%;
    height:34px;
    padding:5px;
}

.produto{
    background:#F5F5F5;
}

.acao{
    width:120px;
    text-align:center;
}
</style>

<div class="container-pcp">

    <div class="app-header">

        <div class="brand">
            SUGGAR
        </div>

        <div class="titulo">
            <h2>SOLICITAÇÃO PCP</h2>
            <span>Planejamento e Controle da Produção</span>
        </div>

    </div>

    <div class="toolbar">

        <button class="btn" id="btnInserir" type="button">
            + Inserir Linha
        </button>

    </div>

    <div class="card">

        <table>

            <thead>

                <tr>

                    <th style="width:20%">CÓD. PRODUTO</th>
                    <th style="width:40%">PRODUTO</th>
                    <th style="width:15%">QTD</th>
                    <th style="width:15%">PRAZO</th>
                    <th style="width:10%">AÇÃO</th>

                </tr>

            </thead>

            <tbody id="tb">

                <tr>

                    <td><input name="codigo"></td>

                    <td><input class="produto" readonly></td>

                    <td><input name="qtd"></td>

                    <td><input name="prazo"></td>

                    <td class="acao">

                        <button type="button" class="btn btn-danger excluir">
                            Excluir
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

(function(){

    function criarLinha(){

        var tr=document.createElement("tr");

        tr.innerHTML=
        '<td><input name="codigo"></td>'+
        '<td><input class="produto" readonly></td>'+
        '<td><input name="qtd"></td>'+
        '<td><input name="prazo"></td>'+
        '<td class="acao">'+
        '<button type="button" class="btn btn-danger excluir">Excluir</button>'+
        '</td>';

        return tr;

    }

    var tbody=document.getElementById("tb");

    document.getElementById("btnInserir").onclick=function(){

        tbody.appendChild(criarLinha());

    };

    tbody.onclick=function(e){

        if(e.target.className.indexOf("excluir")>-1){

            if(tbody.rows.length>1){

                e.target.parentNode.parentNode.remove();

            }

        }

    };

})();

</script>
