<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitação PCP</title>

<style>
:root{
    --navy:#1B3B6F;
    --navy-dark:#122A52;
    --border:#BDBDBD;
    --border-light:#E3E3E3;
    --muted:#6C7A89;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#eef0f2;
    font-family:Segoe UI,Tahoma,sans-serif;
}

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    background:#fff;
    border:1px solid #e3e3e3;
    border-radius:6px;
    padding:16px 24px;
    margin-bottom:20px;
}

.brand-mark{
    font-size:30px;
    font-weight:800;
    font-style:italic;
    color:var(--navy);
}

.brand-divider{
    width:1px;
    height:40px;
    background:#e3e3e3;
}

.page-heading h1{
    margin:0;
    color:var(--navy-dark);
}

.page-heading p{
    margin:5px 0 0;
    color:var(--muted);
}

.toolbar{
    margin-bottom:15px;
}

.btn{
    padding:10px 15px;
    border:1px solid #bdbdbd;
    border-radius:6px;
    background:#fff;
    cursor:pointer;
    font-weight:600;
}

.btn-danger{
    color:#B3261E;
}

.card{
    background:#fff;
    border-radius:6px;
    border:1px solid #e3e3e3;
    padding:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#d9d9d9;
    border:1px solid #bdbdbd;
    padding:10px;
    text-align:center;
}

td{
    border:1px solid #e3e3e3;
    padding:8px;
}

input{
    width:100%;
    height:38px;
    border:1px solid #bdbdbd;
    border-radius:4px;
    padding:0 10px;
}

input[readonly]{
    background:#f5f6f7;
}

.acao{
    width:120px;
    text-align:center;
}
</style>

</head>

<body>

<header class="app-header">

    <div class="brand-mark">
        SUGGAR
    </div>

    <div class="brand-divider"></div>

    <div class="page-heading">
        <h1>SOLICITAÇÃO PCP</h1>
        <p>Planejamento e Controle da Produção</p>
    </div>

</header>

<div class="toolbar">

    <button
        type="button"
        class="btn"
        id="btnInserir">

        + Inserir Linha

    </button>

</div>

<div class="card">

<table>

    <thead>
        <tr>
            <th>CÓD. PRODUTO</th>
            <th>PRODUTO</th>
            <th>QTD</th>
            <th>PRAZO</th>
            <th>AÇÃO</th>
        </tr>
    </thead>

    <tbody id="tb">

        <tr>
            <td>
                <input type="text" name="codigo">
            </td>

            <td>
                <input type="text" class="produto" readonly>
            </td>

            <td>
                <input type="text" name="qtd">
            </td>

            <td>
                <input type="text" name="prazo">
            </td>

            <td class="acao">
                <button
                    type="button"
                    class="btn btn-danger excluir">
                    Excluir
                </button>
            </td>
        </tr>

    </tbody>

</table>

</div>

<script>

const tbody = document.getElementById("tb");
const btnInserir = document.getElementById("btnInserir");

btnInserir.addEventListener("click", function(){

    const linha = document.createElement("tr");

    linha.innerHTML = `
        <td>
            <input type="text" name="codigo">
        </td>

        <td>
            <input type="text" class="produto" readonly>
        </td>

        <td>
            <input type="text" name="qtd">
        </td>

        <td>
            <input type="text" name="prazo">
        </td>

        <td class="acao">
            <button
                type="button"
                class="btn btn-danger excluir">
                Excluir
            </button>
        </td>
    `;

    tbody.appendChild(linha);

});

tbody.addEventListener("click", function(e){

    if(e.target.classList.contains("excluir")){

        const linhas = tbody.querySelectorAll("tr");

        if(linhas.length > 1){

            e.target.closest("tr").remove();

        }

    }

});

</script>

</body>
</html>
