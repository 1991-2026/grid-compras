<style>

.pcp-container{
    font-family:'Segoe UI', Arial, sans-serif;
    padding:20px;
}

.pcp-title{
    color:#0B3A82;
    font-size:26px;
    font-weight:600;
    margin-bottom:5px;
}

.pcp-subtitle{
    color:#6c757d;
    font-size:14px;
    margin-bottom:20px;
}

.btn-add{
    background:#0B3A82;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:10px 18px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
}

.btn-add:hover{
    background:#0F4CA7;
}

.btn-delete{
    background:#D9534F;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:7px 12px;
    font-size:12px;
    cursor:pointer;
}

.tabela-pcp{
    width:100%;
    border-collapse:collapse;
    background:#FFF;
}

.tabela-pcp th{
    background:#F3F3F3;
    border:1px solid #DDD;
    padding:12px;
    font-weight:600;
    text-align:center;
}

.tabela-pcp td{
    border:1px solid #DDD;
    padding:8px;
}

.tabela-pcp input{
    width:100%;
    height:34px;
    border:1px solid #CCC;
    border-radius:3px;
    padding:0 8px;
}

.produto{
    background:#F9F9F9;
}

</style>

<div class="pcp-container">

    <div class="pcp-title">
        Solicitação PCP
    </div>

    <div class="pcp-subtitle">
        Planejamento e Controle da Produção
    </div>

    <button
        id="btnInserir"
        type="button"
        class="btn-add">

        + Inserir Linha

    </button>

    <br><br>

    <table class="tabela-pcp">

        <thead>

            <tr>
                <th style="width:15%">Cód. Produto</th>
                <th style="width:35%">Produto</th>
                <th style="width:15%">Qtd</th>
                <th style="width:20%">Prazo</th>
                <th style="width:15%">Ação</th>
            </tr>

        </thead>

        <tbody id="tb">

            <tr>

                <td>
                    <input type="text" name="codigo[]">
                </td>

                <td>
                    <input
                        type="text"
                        class="produto"
                        readonly>
                </td>

                <td>
                    <input type="text" name="qtd[]">
                </td>

                <td>
                    <input type="date" name="prazo[]">
                </td>

                <td style="text-align:center">

                    <button
                        type="button"
                        class="btn-delete excluir">

                        Excluir

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script>

(function(){

    var botaoInserir =
        document.getElementById('btnInserir');

    if(botaoInserir){

        botaoInserir.onclick = function(){

            var tbody =
                document.getElementById('tb');

            var novaLinha =
                document.createElement('tr');

            novaLinha.innerHTML =
            '<td><input type="text" name="codigo[]"></td>' +
            '<td><input type="text" class="produto" readonly></td>' +
            '<td><input type="text" name="qtd[]"></td>' +
            '<td><input type="date" name="prazo[]"></td>' +
            '<td style="text-align:center">' +
            '<button type="button" class="btn-delete excluir">Excluir</button>' +
            '</td>';

            tbody.appendChild(novaLinha);

        };

    }

    document.onclick = function(e){

        var elemento = e.target;

        if(
            elemento &&
            elemento.className.indexOf('excluir') >= 0
        ){

            var linhas =
                document.querySelectorAll('#tb tr');

            if(linhas.length > 1){

                elemento.closest('tr').remove();

            }
        }

    };

})();

</script>
