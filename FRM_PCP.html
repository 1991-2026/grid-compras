<style>

.pcp-container{
    font-family:'Segoe UI', Arial, sans-serif;
    padding:20px;
}

.pcp-title{
    color:#0B3A82;
    font-size:26px;
    font-weight:600;
    margin-bottom:5px;
}

.pcp-subtitle{
    color:#6c757d;
    font-size:14px;
    margin-bottom:20px;
}

.btn-add{
    background:#0B3A82;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:10px 18px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
}

.btn-delete{
    background:#D9534F;
    color:#FFF;
    border:none;
    border-radius:4px;
    padding:7px 12px;
    font-size:12px;
    cursor:pointer;
}

.tabela-pcp{
    width:100%;
    border-collapse:collapse;
    background:#FFF;
}

.tabela-pcp th{
    background:#F3F3F3;
    border:1px solid #DDD;
    padding:12px;
    font-weight:600;
    text-align:center;
}

.tabela-pcp td{
    border:1px solid #DDD;
    padding:8px;
}

.tabela-pcp input{
    width:100%;
    height:34px;
    border:1px solid #CCC;
    border-radius:3px;
    padding:0 8px;
}

.produto{
    background:#F7F7F7;
}

</style>

<div class="pcp-container">

    <div class="pcp-title">
        Solicitação PCP
    </div>

    <div class="pcp-subtitle">
        Planejamento e Controle da Produção
    </div>

    <button
        id="btnInserir"
        type="button"
        class="btn-add">

        + Inserir Linha

    </button>

    <br><br>

    <table class="tabela-pcp">

        <thead>

            <tr>
                <th style="width:15%">Cód. Produto</th>
                <th style="width:40%">Produto</th>
                <th style="width:15%">Qtd</th>
                <th style="width:20%">Prazo</th>
                <th style="width:10%">Ação</th>
            </tr>

        </thead>

        <tbody id="tb">

            <tr>

                <td>
                    <input
                        type="text"
                        class="codigo-produto">
                </td>

                <td>
                    <input
                        type="text"
                        class="produto"
                        readonly>
                </td>

                <td>
                    <input
                        type="number">
                </td>

                <td>
                    <input
                        type="date">
                </td>

                <td style="text-align:center">

                    <button
                        type="button"
                        class="btn-delete excluir">

                        Excluir

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script>

var produtos = [];

/* Carrega PRODUTOS.csv */

fetch('./PRODUTOS.csv')
.then(function(response){

    return response.text();

})
.then(function(texto){

    var linhas =
        texto.split(/\r?\n/);

    for(var i=1; i<linhas.length; i++){

        if(!linhas[i].trim()){
            continue;
        }

        var campos =
            linhas[i].split(';');

        if(campos.length < 2){
            continue;
        }

        produtos.push({

            codigo:
                campos[0]
                .trim()
                .toUpperCase(),

            descricao:
                campos[1]
                .trim()

        });
    }

    console.log(
        'Produtos carregados:',
        produtos.length
    );

})
.catch(function(erro){

    console.error(
        'Erro carregando PRODUTOS.csv',
        erro
    );

});

/* Busca Produto */

function buscarProduto(campo){

    var codigo =
        campo.value
        .trim()
        .toUpperCase();

    var linha =
        campo.closest('tr');

    var campoProduto =
        linha.querySelector('.produto');

    var encontrado =
        produtos.find(function(item){

            return item.codigo === codigo;

        });

    if(encontrado){

        campoProduto.value =
            encontrado.descricao;

    }else{

        campoProduto.value = '';

    }
}

/* Inserir Linha */

document
.getElementById('btnInserir')
.onclick = function(){

    var tbody =
        document.getElementById('tb');

    var linha =
        document.createElement('tr');

    linha.innerHTML = `

        <td>
            <input
                type="text"
                class="codigo-produto">
        </td>

        <td>
            <input
                type="text"
                class="produto"
                readonly>
        </td>

        <td>
            <input type="number">
        </td>

        <td>
            <input type="date">
        </td>

        <td style="text-align:center">

            <button
                type="button"
                class="btn-delete excluir">

                Excluir

            </button>

        </td>

    `;

    tbody.appendChild(linha);

};

/* Eventos Dinâmicos */

document.addEventListener(
    'blur',
    function(e){

        if(
            e.target.classList.contains(
                'codigo-produto'
            )
        ){

            buscarProduto(
                e.target
            );

        }

    },
    true
);

document.addEventListener(
    'click',
    function(e){

        if(
            e.target.classList.contains(
                'excluir'
            )
        ){

            var linhas =
                document.querySelectorAll(
                    '#tb tr'
                );

            if(linhas.length > 1){

                e.target
                 .closest('tr')
                 .remove();

            }

        }

    }
);

</script>
