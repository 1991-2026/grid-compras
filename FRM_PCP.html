<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Solicitação PCP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#f4f6f9;
    color:#333;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:0 auto;
}

.header{
    background:#ffffff;
    border-radius:12px;
    padding:30px;
    display:flex;
    align-items:center;
    gap:25px;
    box-shadow:0 3px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.logo{
    font-size:42px;
    font-style:italic;
    font-weight:800;
    color:#0B2E63;
    border-right:1px solid #d9d9d9;
    padding-right:20px;
}

.header-info h1{
    font-size:40px;
    color:#0B2E63;
    margin-bottom:5px;
}

.header-info p{
    color:#7a7a7a;
    font-size:16px;
}

.toolbar{
    margin-bottom:15px;
}

.btn-add{
    background:#0B2E63;
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
}

.btn-add:hover{
    background:#143f85;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead tr{
    background:#0B2E63;
}

th{
    color:white;
    padding:14px;
    text-align:center;
    font-size:13px;
    letter-spacing:.5px;
}

td{
    padding:10px;
    border-bottom:1px solid #ececec;
}

input{
    width:100%;
    height:40px;
    border:1px solid #d9d9d9;
    border-radius:6px;
    padding:0 10px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#0B2E63;
}

.produto{
    background:#f7f7f7;
}

.btn-delete{
    background:#d63031;
    color:white;
    border:none;
    border-radius:6px;
    padding:10px 15px;
    cursor:pointer;
    font-size:13px;
}

.btn-delete:hover{
    background:#c0392b;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            SUGGAR
        </div>

        <div class="header-info">
            <h1>SOLICITAÇÃO PCP</h1>
            <p>Planejamento e Controle da Produção</p>
        </div>

    </div>

    <div class="toolbar">

        <button
            type="button"
            class="btn-add"
            onclick="adicionarLinha()">

            + Inserir Linha

        </button>

    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>CÓD. PRODUTO</th>
                    <th>PRODUTO</th>
                    <th>QTD</th>
                    <th>PRAZO</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>

            <tbody id="tb">

                <tr>

                    <td>
                        <input type="text">
                    </td>

                    <td>
                        <input
                            type="text"
                            class="produto"
                            readonly>
                    </td>

                    <td>
                        <input type="text">
                    </td>

                    <td>
                        <input type="text">
                    </td>

                    <td>

                        <button
                            type="button"
                            class="btn-delete"
                            onclick="excluirLinha(this)">

                            Excluir

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

function adicionarLinha(){

    var tbody = document.getElementById("tb");

    var linha = document.createElement("tr");

    linha.innerHTML = `
        <td><input type="text"></td>
        <td><input type="text" class="produto" readonly></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td>
            <button
                type="button"
                class="btn-delete"
                onclick="excluirLinha(this)">
                Excluir
            </button>
        </td>
    `;

    tbody.appendChild(linha);
}

function excluirLinha(botao){

    var tbody = document.getElementById("tb");

    if(tbody.rows.length > 1){

        botao.closest("tr").remove();

    }
}

</script>

</body>
</html>
