<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitação PCP</title>

<script src="httpsdflare.com/ajax/libs/iframe-resizer/3.5.14/iframeResizer.contentWindow.min.js
<script src="https://cdn.senior.com.br/platform/3.2/js/workflow-form.js"></script>

<style>
:root{
    --navy:#1B3B6F;
    --navy-dark:#122A52;
    --gray-bg:#D9D9D9;
    --border:#BDBDBD;
    --border-light:#E3E3E3;
    --text:#2B2B2B;
    --muted:#6C7A89;
    --surface:#FFFFFF;
    --surface-alt:#F5F6F7;
}

*{
    box-sizing:border-box;
}

html,body{
    width:100%;
    min-height:100%;
    margin:0;
}

body{
    padding:20px;
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    color:var(--text);
}

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    background:#FFFFFF;
    border:1px solid var(--border-light);
    border-radius:6px;
    padding:16px 24px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
}

.brand-mark{
    font-weight:700;
    font-style:italic;
    font-size:30px;
    color:var(--navy-dark);
}

.brand-divider{
    width:1px;
    height:40px;
    background:var(--border-light);
}

.page-heading h1{
    margin:0;
    font-size:22px;
}

.page-heading p{
    margin:2px 0 0;
    color:var(--muted);
}

.toolbar{
    margin-bottom:15px;
}

.btn-add{
    background:#123D7A;
    color:#FFF;
    border:1px solid #123D7A;
    border-radius:6px;
    padding:10px 16px;
    cursor:pointer;
}

.btn-add:hover{
    background:#0F3366;
}

.wrap{
    overflow-x:auto;
}

.tabela-pcp{
    width:100%;
    border-collapse:collapse;
}

.tabela-pcp th,
.tabela-pcp td{
    border:1px solid var(--border-light);
    padding:8px;
}

.tabela-pcp th{
    background:#D9D9D9;
    text-align:center;
}

.tabela-pcp input{
    width:100%;
}

.produto{
    background:#F5F6F7;
}

.acao{
    width:120px;
    text-align:center;
}

.btn-delete{
    background:#D9534F;
    color:#FFF;
    border:none;
    border-radius:6px;
    padding:8px 14px;
    cursor:pointer;
}

.btn-delete:hover{
    background:#C9302C;
}

.total-itens{
    margin-top:14px;
    color:#123D7A;
    font-weight:700;
}
</style>

</head>

<body>

<header class="app-header">
    <div class="brand-mark">SUGGAR</div>
    <div class="brand-divider"></div>

    <div class="page-heading">
        <h1>SOLICITAÇÃO PCP</h1>
        <p>Planejamento e Controle da Produção</p>
    </div>
</header>

<div class="toolbar">
    <button type="button" id="btnInserir" class="btn-add">
        + Inserir Linha
    </button>
</div>

<div class="card">
    <div class="wrap">

        <table class="tabela-pcp">

            <thead>
            <tr>
                <th>CÓD. PRODUTO</th>
                <th>PRODUTO</th>
                <th>QTD</th>
                <th>PRAZO</th>
                <th>AÇÃO</th>
            </tr>
            </thead>

            <tbody id="tb">

                <tr>

                    <td>
                        <input
                            type="text"
                            class="codigo-produto">
                    </td>

                    <td>
                        <input
                            type="text"
                            class="produto"
                            readonly>
                    </td>

                    <td>
                        <input
                            type="number"
                            min="1">
                    </td>

                    <td>
                        <input type="date">
                    </td>

                    <td class="acao">
                        <button
                            type="button"
                            class="btn-delete excluir">
                            Excluir
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>
</div>

<div class="total-itens">
    Total de itens:
    <span id="totalItens">1</span>
</div>

<input type="hidden" id="jsonItens" name="jsonItens">
<input type="hidden" id="assuntoSolicitacao" name="assuntoSolicitacao">

<script>
var produtos = [
    {codigo:"TP62BM",descricao:"Dep Suggar Vega 60CM 220V C/Lum"},
    {codigo:"AD2422PT",descricao:"Adega Nantes Suggar 24 G 220V"},
    {codigo:"CT2822BR",descricao:"Centrifuga Suggar Branca 220V"},
    {codigo:"DP62IX",descricao:"Depurador Orion 60CM Inox 220V"},
    {codigo:"EF8662CXBR",descricao:"Espremedor de Frutas Suggar 220V CX C/12"},
    {codigo:"FE4222BR",descricao:"Forno Eletrico Suggar Branco 42 Litros 220V"},
    {codigo:"105008",descricao:"Suporte de fixacao do queimador"}
];

function buscarProduto(campo){

    var codigo = campo.value.trim().toUpperCase();

    var linha = campo.closest("tr");

    var campoProduto =
        linha.querySelector(".produto");

    campoProduto.value = "";

    if(!codigo){
        atualizarDadosProcesso();
        return;
    }

    var encontrado =
        produtos.find(p => p.codigo === codigo);

    if(encontrado){

        campoProduto.value =
            encontrado.descricao;

        campoProduto.style.color =
            "#333";

    }else{

        campoProduto.value =
            "PRODUTO NÃO ENCONTRADO";

        campoProduto.style.color =
            "#D9534F";
    }

    atualizarDadosProcesso();
}

function atualizarTotal(){

    document.getElementById("totalItens")
    .textContent =
        document.querySelectorAll("#tb tr").length;
}

function atualizarDadosProcesso(){

    var itens = [];

    document.querySelectorAll("#tb tr")
    .forEach(function(linha){

        var campos =
            linha.querySelectorAll("input");

        itens.push({
            codigo:campos[0].value,
            produto:campos[1].value,
            quantidade:campos[2].value,
            prazo:campos[3].value
        });

    });

    document.getElementById("jsonItens")
        .value = JSON.stringify(itens);
}

function registrarEventosLinha(linha){

    linha.querySelectorAll("input")
    .forEach(function(campo){

        campo.addEventListener(
            "input",
            atualizarDadosProcesso
        );

        campo.addEventListener(
            "change",
            atualizarDadosProcesso
        );

    });

}

document.addEventListener("blur", function(e){

    if(
        e.target.classList.contains(
            "codigo-produto"
        )
    ){
        buscarProduto(e.target);
    }

}, true);

document.getElementById("btnInserir")
.addEventListener("click", function(){

    var tbody =
        document.getElementById("tb");

    var linha =
        document.createElement("tr");

    linha.innerHTML = `
        <td>
            <input type="text" class="codigo-produto">
        </td>

        <td>
            <input type="text" class="produto" readonly>
        </td>

        <td>
            <input type="number" min="1">
        </td>

        <td>
            <input type="date">
        </td>

        <td class="acao">
            <button
                type="button"
                class="btn-delete excluir">
                Excluir
            </button>
        </td>
    `;

    tbody.appendChild(linha);

    registrarEventosLinha(linha);

    atualizarTotal();
    atualizarDadosProcesso();
});

document.addEventListener(
    "click",
    function(e){

        if(
            e.target.classList.contains(
                "excluir"
            )
        ){

            var linhas =
                document.querySelectorAll(
                    "#tb tr"
                );

            if(linhas.length > 1){

                e.target
                .closest("tr")
                .remove();

                atualizarTotal();
                atualizarDadosProcesso();
            }
        }
    }
);

window.addEventListener("load", function(){

    document
    .querySelectorAll("#tb tr")
    .forEach(registrarEventosLinha);

    atualizarTotal();
    atualizarDadosProcesso();
});

var workflowCockpit = {

    init:function(data){
        console.log(data);
    },

    onSubmit:function(){

        atualizarDadosProcesso();

        return true;
    },

    onError:function(erro){
        console.log(erro);
    }
};
</script>

</body>
</html>
