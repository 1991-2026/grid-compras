<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitação PCP</title>

<style>

/* =====================================================
CONFIGURAÇÕES GERAIS (PADRÃO COMEX / COMPRAS)
===================================================== */

:root{
    --navy:#1B3B6F;
    --navy-dark:#122A52;
    --gray-bg:#D9D9D9;
    --border:#BDBDBD;
    --border-light:#E3E3E3;
    --text:#2B2B2B;
    --muted:#6C7A89;
    --surface:#FFFFFF;
    --surface-alt:#F5F6F7;
    --radius:6px;
}

*{
    box-sizing:border-box;
}


html,
body{
    margin:0;
    padding:0;
    width:100%;
    min-width:100%;
    min-height:100%;
    background:#EEF0F2;
    overflow-x:hidden;
}

body{
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    color:var(--text);
    font-size:16px;
    padding:20px;
}

/* =====================================================
CABEÇALHO
===================================================== */

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    background:#FFFFFF;
    border:1px solid var(--border-light);
    border-radius:6px;
    padding:16px 24px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
}

.brand-mark{
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    font-weight:700;
    font-style:italic;
    font-size:30px;
    color:var(--navy-dark);
    white-space:nowrap;
}

.brand-divider{
    width:1px;
    height:40px;
    background:var(--border-light);
}

.page-heading h1{
    margin:0;
    font-size:22px;
    font-weight:700;
    color:var(--navy-dark);
}

.page-heading p{
    margin:2px 0 0;
    font-size:14px;
    color:var(--muted);
}

/* =====================================================
BOTÃO INSERIR
===================================================== */

.toolbar{
    margin-bottom:14px;
}

.btn-add{
    background:#123D7A;
    border:1px solid #123D7A;
    border-radius:6px;
    padding:10px 16px;
    color:#FFFFFF;
    font-weight:600;
    cursor:pointer;
}

.btn-add:hover{
    background:#0F3366;
}

/* =====================================================
CARD
===================================================== */

.card{
    width:100%;
    background:#FFFFFF;
    border:1px solid var(--border-light);
    border-radius:6px;
    overflow:hidden;
}

.wrap{
    width:100%;
    overflow-x:auto;
}

/* =====================================================
TABELA
===================================================== */

.tabela-pcp{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

.tabela-pcp th,
.tabela-pcp td{
    border:1px solid var(--border-light);
    padding:8px;
}

.tabela-pcp th{
    background:#D9D9D9;
    border:1px solid #E3E3E3;
    padding:8px;
    text-align:center;
    vertical-align:middle;

    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    font-size:16px;
    font-weight:700;
    color:#1F1F1F;

    line-height:1.15;
    white-space:normal;
}
.tabela-pcp input{
    width:100%;
    height:40px;
    border:1px solid var(--border);
    border-radius:4px;
    padding:0 10px;
    font-size:14px;
}

.produto{
    background:var(--surface-alt);
    color:#555;
}

.acao{
    width:120px;
    text-align:center;
}

/* =====================================================
BOTÃO EXCLUIR
===================================================== */

.btn-delete{
    background:#D9534F;
    color:#FFFFFF;
    border:1px solid #D9534F;
    border-radius:6px;
    padding:8px 14px;
    font-size:14px;
    font-weight:400;
    cursor:pointer;
}
.btn-delete:hover{
    background:#C9302C;
}

/* =====================================================
CONTADOR
===================================================== */

.total-itens{
    margin-top:14px;
    color:#123D7A;
    font-size:14px;
    font-weight:700;
}

</style>
<script>
/* =====================================================
REDIMENSIONAMENTO AUTOMÁTICO DO FORMULÁRIO
===================================================== */

function resizeFormulario() {

    try {

        var altura = Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight,
            document.body.offsetHeight,
            document.documentElement.offsetHeight
        );

        if (window.parent) {

            window.parent.postMessage({
                frameHeight: altura + 50
            }, "*");

        }

    } catch (e) {
        console.log(e);
    }
}

window.addEventListener("load", function () {

    resizeFormulario();

    setTimeout(resizeFormulario, 500);
    setTimeout(resizeFormulario, 1000);
    setTimeout(resizeFormulario, 2000);

});

window.addEventListener("resize", resizeFormulario);

/* Atualiza quando inserir/excluir linhas */
const observer = new MutationObserver(function () {
    resizeFormulario();
});

observer.observe(document.body, {
    childList: true,
    subtree: true
});
</script>

</head>

<body>

<!-- =====================================================
CABEÇALHO
===================================================== -->

<header class="app-header">

    <div class="brand-mark">
        SUGGAR
    </div>

    <div class="brand-divider"></div>

    <div class="page-heading">

        <h1>
            SOLICITAÇÃO PCP
        </h1>

        <p>
            Planejamento e Controle da Produção
        </p>

    </div>

</header>

<!-- =====================================================
BOTÃO INSERIR
===================================================== -->

<div class="toolbar">

    <button
        type="button"
        id="btnInserir"
        class="btn-add">

        + Inserir Linha

    </button>

</div>

<!-- =====================================================
TABELA
===================================================== -->

<div class="card">

    <div class="wrap">

        <table class="tabela-pcp">

            <thead>
    <tr>
        <th style="width:20%;">CÓD.<br>PRODUTO</th>
        <th style="width:20%;">PRODUTO</th>
        <th style="width:20%;">QTD</th>
        <th style="width:20%;">PRAZO</th>
        <th style="width:20%;">AÇÃO</th>
    </tr>
</thead>

            <tbody id="tb">

                <tr>

                    <td>
                        <input
                            type="text"
                            class="codigo-produto"
                            onblur="buscarProduto(this)">
                    </td>

                    <td>
                        <input
                            type="text"
                            class="produto"
                            readonly>
                    </td>

                    <td>
                        <input
                            type="number"
                            min="1">
                    </td>

                    <td>
                        <input
                            type="date">
                    </td>

                    <td class="acao">

                        <button
                            type="button"
                            class="btn-delete excluir">

                            Excluir

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- =====================================================
CONTADOR DE ITENS
===================================================== -->

<div class="total-itens">

    Total de itens:
    <span id="totalItens">1</span>

</div>

<input
    type="hidden"
    id="jsonItens"
    name="jsonItens">

<input
    type="hidden"
    id="assuntoSolicitacao"
    name="assuntoSolicitacao">

<script>

/* =====================================================
BASE DE PRODUTOS
===================================================== */

var produtos = [

    {
        codigo:"TP62BM",
        descricao:"Dep Suggar Vega 60CM 220V C/Lum"
    },

    {
        codigo:"AD2422PT",
        descricao:"Adega Nantes Suggar 24 G 220V"
    },

    {
        codigo:"CT2822BR",
        descricao:"Centrifuga Suggar Branca 220V"
    },

    {
        codigo:"DP62IX",
        descricao:"Depurador Orion 60CM Inox 220V"
    },

    {
        codigo:"EF8662CXBR",
        descricao:"Espremedor de Frutas Suggar 220V CX C/12"
    },

    {
        codigo:"FE4222BR",
        descricao:"Forno Eletrico Suggar Branco 42 Litros 220V"
    },

    {
        codigo:"105008",
        descricao:"Suporte de fixacao do queimador"
    }

];

/* =====================================================
BUSCAR PRODUTO
===================================================== */

function buscarProduto(campo){

    var codigo =
        campo.value.trim().toUpperCase();

    var linha =
        campo.closest('tr');

    var campoProduto =
        linha.querySelector('.produto');

    campoProduto.value = '';

    if(!codigo){
        return;
    }

    var encontrado =
        produtos.find(function(item){

            return item.codigo === codigo;

        });

    if(encontrado){

        campoProduto.value =
            encontrado.descricao;

        campoProduto.style.color =
            '#333';

    }else{

        campoProduto.value =
            'PRODUTO NÃO ENCONTRADO';

        campoProduto.style.color =
            '#D9534F';

    }

    atualizarDadosProcesso();
}

/* =====================================================
TOTAL ITENS
===================================================== */

function atualizarTotal(){

    document.getElementById(
        'totalItens'
    ).textContent =

    document.querySelectorAll(
        '#tb tr'
    ).length;
}

/* =====================================================
INSERIR LINHA
===================================================== */

document
.getElementById('btnInserir')
.onclick = function(){

    var tbody =
        document.getElementById('tb');

    var linha =
        document.createElement('tr');

    linha.innerHTML = `

        <td>
            <input
                type="text"
                class="codigo-produto"
                onblur="buscarProduto(this)">
        </td>

        <td>
            <input
                type="text"
                class="produto"
                readonly>
        </td>

        <td>
            <input
                type="number"
                min="1">
        </td>

        <td>
            <input
                type="date">
        </td>

        <td class="acao">

            <button
                type="button"
                class="btn-delete excluir">

                Excluir

            </button>

        </td>
    `;

    tbody.appendChild(linha);

    atualizarTotal();
    atualizarDadosProcesso();
};

/* =====================================================
GERA JSON
===================================================== */

function atualizarDadosProcesso(){

    var itens = [];

    document
    .querySelectorAll('#tb tr')
    .forEach(function(linha){

        var campos =
            linha.querySelectorAll('input');

        itens.push({

            codigo:campos[0].value,
            produto:campos[1].value,
            quantidade:campos[2].value,
            prazo:campos[3].value

        });

    });

    document
    .getElementById('jsonItens')
    .value = JSON.stringify(itens);
}

/* =====================================================
EXCLUIR LINHA
===================================================== */

document.addEventListener(
    'click',
    function(e){

        if(
            e.target.classList.contains(
                'excluir'
            )
        ){

            var linhas =
                document.querySelectorAll(
                    '#tb tr'
                );

            if(linhas.length > 1){

                e.target
                .closest('tr')
                .remove();

                atualizarTotal();
                atualizarDadosProcesso();
            }
        }
    }
);

/* =====================================================
LOAD
===================================================== */

window.addEventListener(
    'load',
    function(){

        atualizarTotal();
        atualizarDadosProcesso();

    }
);

</script>

</body>
</html>
