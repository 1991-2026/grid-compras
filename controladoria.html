<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ANÁLISE DA CONTROLADORIA</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
}

body{
    font-family:Tahoma,Arial,sans-serif;
    font-size:18px;
    padding:5px;
}

h2{
    font-size:24px;
    font-weight:700;
    margin:4px 0 10px;
}

h3{
    font-size:20px;
    font-weight:700;
    margin:8px 0;
}

.wrap{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
    table-layout:fixed;
}

th{
    background:#D9D9D9;
    border:1px solid #B7B7B7;
    padding:8px;
    text-align:center;
    font-size:18px;
}

td{
    border:1px solid #B7B7B7;
    padding:6px;
}

input[type=text]{
    width:100%;
    height:38px;
    background:#F2F2F2;
    border:2px solid #000;
    font-size:18px;
}

textarea{
    width:100%;
    height:240px;
    border:2px solid #000;
    padding:10px;
    font-size:18px;
}

input[type=checkbox]{
    width:22px;
    height:22px;
}

.c{
    text-align:center;
}
</style>

<script>
function sel(a,b){
    if(document.getElementById(a).checked){
        document.getElementById(b).checked=false;
    }
}

function validarControladoria(){

    var rc=document.getElementById('reprovado_comex').checked;
    var rp=document.getElementById('reprovado_compras').checked;
    var j=document.getElementById('justificativa').value.trim();

    if((rc||rp) && j===''){
        alert(
            'A REPROVAÇÃO DA PROPOSTA REQUER O PREENCHIMENTO OBRIGATÓRIO DA JUSTIFICATIVA DA DECISÃO DA CONTROLADORIA.'
        );

        document.getElementById('justificativa').focus();

        return false;
    }

    return true;
}
</script>

</head>

<body>

<h2>ANÁLISE DA CONTROLADORIA</h2>

<div class="wrap">

<table>
<tr>
    <th>PRODUTO</th>
    <th>QTD COMEX</th>
    <th>PREÇO UNIT.</th>
    <th>PREÇO TOTAL</th>
    <th>PRAZO</th>
    <th>INDICADOR</th>
    <th>APR.</th>
    <th>REP.</th>
</tr>

<tr>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>

    <td class="c">
        <input
            type="checkbox"
            id="aprovado_comex"
            onclick="sel('aprovado_comex','reprovado_comex')">
    </td>

    <td class="c">
        <input
            type="checkbox"
            id="reprovado_comex"
            onclick="sel('reprovado_comex','aprovado_comex')">
    </td>
</tr>
</table>

<table>
<tr>
    <th>PRODUTO</th>
    <th>QTD COMPRA</th>
    <th>PREÇO UNIT.</th>
    <th>PREÇO TOTAL</th>
    <th>PRAZO</th>
    <th>INDICADOR</th>
    <th>APR.</th>
    <th>REP.</th>
</tr>

<tr>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>
    <td><input type="text" readonly></td>

    <td class="c">
        <input
            type="checkbox"
            id="aprovado_compras"
            onclick="sel('aprovado_compras','reprovado_compras')">
    </td>

    <td class="c">
        <input
            type="checkbox"
            id="reprovado_compras"
            onclick="sel('reprovado_compras','aprovado_compras')">
    </td>
</tr>
</table>

</div>

<h3>JUSTIFICATIVA DA DECISÃO DA CONTROLADORIA</h3>

<textarea
id="justificativa"
placeholder="INFORME DE FORMA OBJETIVA OS MOTIVOS QUE FUNDAMENTAM A REPROVAÇÃO DA PROPOSTA, INCLUINDO DIVERGÊNCIAS IDENTIFICADAS, RESTRIÇÕES FINANCEIRAS, INCONSISTÊNCIAS COMERCIAIS, DOCUMENTAIS OU QUALQUER OUTRO FATOR QUE IMPACTE A APROVAÇÃO."></textarea>

</body>
</html>
