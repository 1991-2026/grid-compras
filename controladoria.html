<style>
*{
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
}

body{
    font-family:Tahoma,Arial,sans-serif;
    font-size:18px;
    padding:5px;
}

h2{
    font-size:24px;
    font-weight:700;
    margin:4px 0 10px;
}

h3{
    font-size:20px;
    font-weight:700;
    margin:8px 0;
}

.wrap{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
    table-layout:fixed;
}

th{
    background:#D9D9D9;
    border:1px solid #B7B7B7;
    padding:8px;
    text-align:center;
    font-size:18px;
}

td{
    border:1px solid #B7B7B7;
    padding:6px;
}

input[type=text]{
    width:100%;
    height:38px;
    background:#F2F2F2;
    border:2px solid #000;
    font-size:18px;
}

textarea{
    width:100%;
    height:240px;
    border:2px solid #000;
    padding:10px;
    font-size:18px;
}

input[type=checkbox]{
    width:22px;
    height:22px;
}

.c{
    text-align:center;
}
</style>
