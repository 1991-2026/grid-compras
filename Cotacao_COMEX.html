<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>COTAÇÃO COMEX</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    font-size:18px;
    padding:10px;
}

.cabecalho{
    display:flex;
    align-items:center;
    gap:25px;
    width:100%;
    padding:12px 20px;
    margin-bottom:20px;
    border:1px solid #777;
    background:#ffffff;
}

.logo{
    height:60px;
    width:auto;
    display:block;
    object-fit:contain;
}

.cabecalho-texto{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.titulo-setor{
    font-size:22px;
    font-weight:700;
    color:#1E3F73;
    text-transform:uppercase;
}

.subtitulo-setor{
    font-size:15px;
    color:#555;
    margin-top:4px;
}

.wrap{
    width:100%;
    overflow-x:auto;
}

table{
    border-collapse:collapse;
    min-width:1800px;
    white-space:nowrap;
}

th,td{
    border:1px solid #bdbdbd;
    padding:8px;
}

th{
    background:#d9d9d9;
}

input{
    width:100%;
    min-width:120px;
    height:38px;
    font-size:18px;
}

.readonly{
    background:#f5f5f5;
}

.acao{
    width:140px;
    text-align:center;
}

button{
    font-size:18px;
    cursor:pointer;
}
</style>

<script>
function moeda(v){
    return new Intl.NumberFormat(
        'pt-BR',
        {
            style:'currency',
            currency:'BRL'
        }
    ).format(v);
}

function valor(c){
    let n=(c.value||'')
        .replace(/\./g,'')
        .replace(',','.')
        .replace(/[^0-9.]/g,'');

    return parseFloat(n)||0;
}

function calc(el){
    let tr=el.closest('tr');

    let q=valor(tr.querySelector('.qtd'));
    let p=valor(tr.querySelector('.preco'));

    tr.querySelector('.total').value=moeda(q*p);
}

function fmt(el){
    let v=valor(el);

    el.value=v ? moeda(v) : '';

    calc(el);
}

function addRow(){
    let r=document.getElementById('tb').insertRow();
    r.innerHTML=document.getElementById('tpl').innerHTML;
}

function delRow(btn){
    btn.closest('tr').remove();
}
</script>

</head>

<body>

<div class="cabecalho">

    <img
        src="LOGO WINDOWS.png"
        alt="Logo Suggar"
        class="logo">

    <div class="cabecalho-texto">

        <div class="titulo-setor">
            COTAÇÃO COMEX
        </div>

        <div class="subtitulo-setor">
            Comércio Exterior
        </div>

    </div>

</div>

<button type="button" onclick="addRow()">
    + Inserir Linha
</button>

<div class="wrap">

<table>

<thead>
<tr>
    <th>CÓD.</th>
    <th>PRODUTO</th>
    <th>QTD PROD.</th>
    <th>PRAZO PCP</th>
    <th>CÓD. FORN.</th>
    <th>FORNECEDOR</th>
    <th>QTD COMEX</th>
    <th>PREÇO UNIT.</th>
    <th>TOTAL</th>
    <th>PRAZO COMEX</th>
    <th>AÇÃO</th>
</tr>
</thead>

<tbody id="tb">
</tbody>

</table>

</div>

<template id="tpl">

<tr>

<td>
    <input class="readonly" readonly>
</td>

<td>
    <input class="readonly" readonly>
</td>

<td>
    <input class="readonly" readonly>
</td>

<td>
    <input class="readonly" readonly>
</td>

<td>
    <input>
</td>

<td>
    <input class="readonly" readonly>
</td>

<td>
    <input class="qtd" oninput="calc(this)">
<
           onblur="fmt(this)">
</td>

<td>
    <input class="total readonly" readonly>
</td>

<td>
    <input>
</td>

<td class="acao">
    <button type="button" onclick="delRow(this)">
        Excluir
    </button>
</td>

</tr>

</template>

<script>
addRow();
</script>

</body>
</html>
