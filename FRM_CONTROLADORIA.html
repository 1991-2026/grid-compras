<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Análise da Controladoria</title>

<style>

/* =====================================================
CONFIGURAÇÕES GERAIS
===================================================== */

:root{
    --navy:#1B3B6F;
    --navy-dark:#122A52;
    --gray-bg:#D9D9D9;
    --border:#BDBDBD;
    --border-light:#E3E3E3;
    --text:#2B2B2B;
    --muted:#6C7A89;
    --surface:#FFFFFF;
    --surface-alt:#F5F6F7;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    background:#EEF0F2;
}

body{
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    color:var(--text);
    font-size:16px;
    padding:20px;
}

/* =====================================================
CABEÇALHO
===================================================== */

.app-header{
    display:flex;
    align-items:center;
    gap:20px;
    background:#FFFFFF;
    border:1px solid var(--border-light);
    border-radius:6px;
    padding:16px 24px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
}

.brand-mark{
    font-size:30px;
    font-weight:700;
    font-style:italic;
    color:var(--navy-dark);
}

.brand-divider{
    width:1px;
    height:40px;
    background:var(--border-light);
}

.page-heading h1{
    margin:0;
    font-size:22px;
    font-weight:700;
    color:var(--navy-dark);
}

.page-heading p{
    margin:2px 0 0;
    font-size:14px;
    color:var(--muted);
}

/* =====================================================
CARD
===================================================== */

.card{
    background:#FFFFFF;
    border:1px solid var(--border-light);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:20px;
}

.wrap{
    overflow-x:auto;
}

/* =====================================================
TABELA
===================================================== */

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,
td{
    border:1px solid var(--border-light);
    padding:8px;
}

th{
    background:var(--gray-bg);
    text-align:center;
    font-size:16px;
    font-weight:700;
    color:#1F1F1F;
    line-height:1.2;
}

td{
    background:#FFFFFF;
}

/* =====================================================
CAMPOS
===================================================== */

input[type="text"]{
    width:100%;
    height:40px;
    border:1px solid var(--border);
    border-radius:4px;
    padding:0 10px;
    background:var(--surface-alt);
}

textarea{
    width:100%;
    min-height:220px;
    border:1px solid var(--border);
    border-radius:4px;
    padding:12px;
    resize:vertical;
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
}

.c{
    text-align:center;
}

input[type="checkbox"]{
    width:18px;
    height:18px;
    cursor:pointer;
}

/* =====================================================
SEÇÃO JUSTIFICATIVA
===================================================== */

.section-title{
    color:var(--navy-dark);
    font-size:18px;
    font-weight:700;
    margin:20px 0 10px;
}

</style>

<script>

/* =====================================================
SELEÇÃO EXCLUSIVA
===================================================== */

function sel(a,b){

    if(document.getElementById(a).checked){

        document.getElementById(b).checked = false;
    }
}

/* =====================================================
VALIDAÇÃO CONTROLADORIA
===================================================== */

function validarControladoria(){

    var rc =
        document.getElementById(
            'reprovado_comex'
        ).checked;

    var rp =
        document.getElementById(
            'reprovado_compras'
        ).checked;

    var j =
        document.getElementById(
            'justificativa'
        ).value.trim();

    if((rc || rp) && j === ''){

        alert(
            'A REPROVAÇÃO DA PROPOSTA REQUER O PREENCHIMENTO OBRIGATÓRIO DA JUSTIFICATIVA.'
        );

        document.getElementById(
            'justificativa'
        ).focus();

        return false;
    }

    return true;
}

</script>

</head>

<body>

<!-- =====================================================
CABEÇALHO
===================================================== -->

<header class="app-header">

    <div class="brand-mark">
        SUGGAR
    </div>

    <div class="brand-divider"></div>

    <div class="page-heading">

        <h1>
            ANÁLISE DA CONTROLADORIA
        </h1>

        <p>
            Validação e Aprovação de Processos de Comércio Exterior
        </p>

    </div>

</header>

<!-- =====================================================
TABELA COMEX
===================================================== -->

<div class="card">

    <div class="wrap">

        <table>

            <thead>

                <tr>
                    <th>PRODUTO</th>
                    <th>QTD COMEX</th>
                    <th>PREÇO UNIT.</th>
                    <th>PREÇO TOTAL</th>
                    <th>PRAZO</th>
                    <th>INDICADOR</th>
                    <th>APR.</th>
                    <th>REP.</th>
                </tr>

            </thead>

            <tbody>

                <tr>

                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>

                    <td class="c">

                        <input
                            type="checkbox"
                            id="aprovado_comex"
                            onclick="sel('aprovado_comex','reprovado_comex')">

                    </td>

                    <td class="c">

                        <input
                            type="checkbox"
                            id="reprovado_comex"
                            onclick="sel('reprovado_comex','aprovado_comex')">

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- =====================================================
TABELA COMPRAS
===================================================== -->

<div class="card">

    <div class="wrap">

        <table>

            <thead>

                <tr>
                    <th>PRODUTO</th>
                    <th>QTD COMPRAS</th>
                    <th>PREÇO UNIT.</th>
                    <th>PREÇO TOTAL</th>
                    <th>PRAZO</th>
                    <th>INDICADOR</th>
                    <th>APR.</th>
                    <th>REP.</th>
                </tr>

            </thead>

            <tbody>

                <tr>

                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>
                    <td><input type="text" readonly></td>

                    <td class="c">

                        <input
                            type="checkbox"
                            id="aprovado_compras"
                            onclick="sel('aprovado_compras','reprovado_compras')">

                    </td>

                    <td class="c">

                        <input
                            type="checkbox"
                            id="reprovado_compras"
                            onclick="sel('reprovado_compras','aprovado_compras')">

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- =====================================================
JUSTIFICATIVA
===================================================== -->

<div class="section-title">
    Justificativa da Decisão da Controladoria
</div>

<textarea
    id="justificativa"
    placeholder="Informe a justificativa..."></textarea>

</body>
</html>
